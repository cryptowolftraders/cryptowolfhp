<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐺 Wolf OB Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a; --bg2:#121826; --panel:#121826; --panel2:#121826;
    --border:#1a2233; --border2:#1f2740;
    --txt:#e8edf5; --muted:#8892a8; --muted2:#1f2740;
    --teal:#22c55e; --teal-dim:#22c55e;
    --bull:#22c55e; --bear:#ef4444; --gold:#f5b342;
    --glow:0 0 0 1px rgba(34,197,94,.15), 0 0 22px -6px rgba(34,197,94,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(34,197,94,.07), transparent 60%),
      radial-gradient(700px 400px at 5% 0%, rgba(245,179,66,.05), transparent 55%),
      linear-gradient(180deg,#0a0e1a,#0a0e1a);
    color:var(--txt); font-family:'Sora',sans-serif; line-height:1.5;
    -webkit-font-smoothing:antialiased; padding:0 0 60px;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.4; z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
    background-size:44px 44px;
  }
  .wrap{position:relative; z-index:1; max-width:1340px; margin:0 auto; padding:0 20px}

  /* Header */
  header{padding:28px 0 18px; border-bottom:1px solid var(--border)}
  .brand{display:flex; align-items:center; gap:16px}
  .logo{
    width:58px; height:58px; flex:0 0 58px; display:grid; place-items:center;
    font-size:30px; border-radius:14px;
    background:linear-gradient(155deg,#1a2233,#0a0e1a);
    border:1px solid var(--border2); box-shadow:var(--glow);
  }
  h1{font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:26px; letter-spacing:.5px; line-height:1.1}
  h1 span{color:var(--teal)}
  .sub{color:var(--muted); font-size:13px; margin-top:3px; letter-spacing:.3px}
  .topmeta{margin-left:auto; text-align:right; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted)}
  .topmeta b{color:var(--teal)}

  /* Banner (new / delist) */
  .banner{margin-top:18px; display:none; gap:14px; flex-wrap:wrap}
  .banner.show{display:flex}
  .bcard{flex:1 1 300px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:13px 16px}
  .bcard h4{font-family:'Chakra Petch',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:9px}
  .bcard.new h4{color:var(--bull)} .bcard.del h4{color:var(--bear)}
  .chips{display:flex; flex-wrap:wrap; gap:6px}
  .chip{font-family:'JetBrains Mono',monospace; font-size:11px; padding:3px 8px; border-radius:6px; background:#121826; border:1px solid var(--border2)}
  .bcard.new .chip{color:var(--bull); border-color:rgba(34,197,94,.3)}
  .bcard.del .chip{color:var(--bear); border-color:rgba(239,68,68,.3)}
  .chip.none{color:var(--muted2)}

  /* Controls */
  .panel{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-top:20px}
  .ctitle{font-family:'Chakra Petch',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:11px; display:flex; align-items:center; gap:8px}
  .ctitle::before{content:""; width:14px; height:2px; background:var(--teal); display:inline-block}

  .tfgrid{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:6px}
  .tf{
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500;
    padding:7px 12px; border-radius:9px; cursor:pointer; user-select:none;
    background:#121826; border:1px solid var(--border2); color:var(--muted); transition:.15s;
  }
  .tf:hover{border-color:var(--teal-dim); color:var(--txt)}
  .tf.on{background:linear-gradient(180deg,rgba(34,197,94,.16),rgba(34,197,94,.05)); border-color:var(--teal); color:var(--teal); box-shadow:0 0 14px -5px rgba(34,197,94,.5)}
  .tf.dis{opacity:.32; cursor:not-allowed; text-decoration:line-through}
  .tfnote{font-size:11px; color:var(--muted2); margin-top:4px}

  .row{display:flex; flex-wrap:wrap; gap:22px; margin-top:18px; align-items:flex-end}
  .field{display:flex; flex-direction:column; gap:6px}
  .field label{font-size:11px; letter-spacing:.5px; color:var(--muted); text-transform:uppercase; font-family:'Chakra Petch',sans-serif}
  select,input[type=number]{
    background:#121826; border:1px solid var(--border2); color:var(--txt); border-radius:9px;
    padding:8px 11px; font-family:'JetBrains Mono',monospace; font-size:13px; outline:none; min-width:96px;
  }
  select:focus,input:focus{border-color:var(--teal)}
  .check{display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:var(--txt); padding-bottom:9px}
  .check input{accent-color:var(--teal); width:16px; height:16px}

  .actions{display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; align-items:center}
  button.run{
    font-family:'Chakra Petch',sans-serif; font-weight:700; letter-spacing:1px; font-size:14px;
    padding:12px 28px; border-radius:11px; border:1px solid var(--teal); cursor:pointer;
    background:linear-gradient(180deg,rgba(34,197,94,.22),rgba(34,197,94,.06)); color:var(--teal);
    box-shadow:0 0 20px -7px rgba(34,197,94,.6); transition:.15s;
  }
  button.run:hover{background:rgba(34,197,94,.3); color:#e8edf5}
  button.run:disabled{opacity:.4; cursor:not-allowed; box-shadow:none}
  button.stop{
    font-family:'Chakra Petch',sans-serif; font-weight:600; letter-spacing:1px; font-size:13px;
    padding:12px 22px; border-radius:11px; border:1px solid var(--bear); cursor:pointer;
    background:rgba(239,68,68,.08); color:var(--bear);
  }
  button.stop:disabled{opacity:.35; cursor:not-allowed}
  .est{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted)}

  /* Progress */
  .progwrap{margin-top:18px; display:none}
  .progwrap.show{display:block}
  .pbar{height:8px; background:#121826; border:1px solid var(--border2); border-radius:6px; overflow:hidden}
  .pfill{height:100%; width:0%; background:linear-gradient(90deg,var(--teal-dim),var(--teal)); transition:width .25s; box-shadow:0 0 12px rgba(34,197,94,.6)}
  .ptext{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-top:7px; display:flex; justify-content:space-between}

  /* Stats */
  .stats{display:flex; gap:12px; flex-wrap:wrap; margin-top:22px}
  .stat{flex:1 1 130px; background:var(--panel); border:1px solid var(--border); border-radius:13px; padding:14px 16px}
  .stat .n{font-family:'Chakra Petch',sans-serif; font-size:26px; font-weight:700}
  .stat .l{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:2px}
  .stat.al .n{color:var(--bull)} .stat.sat .n{color:var(--bear)} .stat.cf .n{color:var(--gold)} .stat.tot .n{color:var(--teal)}

  /* Table */
  .tablewrap{margin-top:22px; background:var(--panel); border:1px solid var(--border); border-radius:16px; overflow:hidden}
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{
    font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--muted); text-align:left; padding:13px 14px; border-bottom:1px solid var(--border2);
    background:var(--bg2); cursor:pointer; white-space:nowrap; user-select:none; position:sticky; top:0;
  }
  thead th:hover{color:var(--teal)}
  thead th .ar{color:var(--teal); font-size:10px}
  tbody td{padding:11px 14px; border-bottom:1px solid rgba(26,34,51,.55); font-family:'JetBrains Mono',monospace; vertical-align:middle}
  tbody tr:hover{background:rgba(34,197,94,.035)}
  tbody tr:last-child td{border-bottom:none}
  .sym{font-weight:700; font-family:'Sora',sans-serif; color:var(--txt)}
  .sym a{color:inherit; text-decoration:none}
  .sym a:hover{color:var(--teal)}
  .pos{color:var(--bull)} .neg{color:var(--bear)}
  .pill{font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:11px; letter-spacing:.5px; padding:3px 9px; border-radius:7px; display:inline-block}
  .pill.al{background:rgba(34,197,94,.14); color:var(--bull); border:1px solid rgba(34,197,94,.35)}
  .pill.sat{background:rgba(239,68,68,.13); color:var(--bear); border:1px solid rgba(239,68,68,.35)}
  .pill.none{background:#121826; color:var(--muted2); border:1px solid var(--border2)}
  .inside{background:var(--gold)!important; color:#121826!important; border-color:var(--gold)!important; box-shadow:0 0 12px -3px rgba(245,179,66,.6)}
  .tfb{font-size:10px; padding:2px 6px; border-radius:5px; background:#121826; border:1px solid var(--border2); color:var(--muted); margin-right:3px}
  .strength{display:flex; align-items:center; gap:7px}
  .sbar{width:54px; height:6px; background:#121826; border-radius:4px; overflow:hidden; border:1px solid var(--border2)}
  .sbar i{display:block; height:100%; background:linear-gradient(90deg,var(--teal-dim),var(--gold))}
  .xcnt{color:var(--gold); font-weight:700; font-family:'Chakra Petch',sans-serif}
  .empty{padding:48px; text-align:center; color:var(--muted); font-family:'Sora',sans-serif}
  .err{color:var(--bear); font-family:'JetBrains Mono',monospace; font-size:12px; margin-top:10px; display:none}
  footer{margin-top:30px; text-align:center; color:var(--muted2); font-size:11.5px; font-family:'JetBrains Mono',monospace; line-height:1.7}
  .spin{display:inline-block; width:13px; height:13px; border:2px solid rgba(34,197,94,.3); border-top-color:var(--teal); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
<style>
.header,.header-row,.brand,.brand-row,.header-stats,.controls{flex-wrap:wrap;}
.tf-group,.filter-group,.filter-row,.filter-pills,.filter-bar,.tabs,.actions,.tfgrid,.seg,.segmented,.tf-btns,.tf-list{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
.tf-btn,.filter-btn,.tab,.pill,.seg-btn{flex-shrink:0;}
.tablewrap,#tablewrap,.table-wrap,.tbl-wrap,.table-container,.feed{overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;}
@media(max-width:860px){
.header{height:auto!important;min-height:0;row-gap:8px;}
.grid,.signals-grid,.tools-grid,.coins-grid,.card-grid,.dash-grid,.setup-grid,.portfolio-grid{grid-template-columns:1fr!important;}
}

/* === Wolf standart logo (tek düzen) === */
img.wolf-logo-std{width:46px!important;height:46px!important;border-radius:10px!important;filter:drop-shadow(0 0 6px rgba(45,212,191,.55)) drop-shadow(0 0 12px rgba(45,212,191,.3))!important;vertical-align:middle!important;background:transparent!important;box-shadow:none!important;padding:0!important;object-fit:contain!important;flex:0 0 auto!important}
@media(max-width:600px){img.wolf-logo-std{width:38px!important;height:38px!important}}
.logo{background:none!important;border:none!important;box-shadow:none!important;width:auto!important;height:auto!important;min-width:0!important;place-items:center!important;flex:0 0 auto!important}

/* === Wolf tek düzen tipografi (Göktürk standardı) — sadece yazı, layout değişmez === */
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif!important}
input,select,textarea,button{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif!important}
h1{font-family:'Cinzel',serif!important;font-weight:700!important;font-size:22px!important;letter-spacing:.5px!important;line-height:1.15!important}
h2{font-family:'Cinzel',serif!important;font-weight:700!important;font-size:16px!important;letter-spacing:.4px!important}
h3{font-weight:700!important;font-size:14px!important}
label{font-size:11px!important;letter-spacing:.4px!important}
input,select,textarea{font-size:13px!important}
button{font-size:12.5px!important;font-weight:700!important;letter-spacing:.3px!important}
@media(max-width:600px){h1{font-size:18px!important}h2{font-size:15px!important}}
</style>

<script>
"use strict";
const BASE = "https://web-production-2bdde.up.railway.app";

/* ---------- Zaman dilimleri (destekli) + konfluens ağırlığı ---------- */
const TFS = [
  {tf:'1m', sec:60,      w:1.0},
  {tf:'3m', sec:180,     w:1.3},
  {tf:'5m', sec:300,     w:1.6},

  {tf:'1h', sec:3600,    w:3.0},
  {tf:'2h', sec:7200,    w:3.6},
  {tf:'4h', sec:14400,   w:4.6},
  {tf:'6h', sec:21600,   w:5.2},
  {tf:'8h', sec:28800,   w:5.6},
  {tf:'12h',sec:43200,   w:6.2},
  {tf:'1d', sec:86400,   w:7.5},
  {tf:'3d', sec:259200,  w:8.5},
  {tf:'1w', sec:604800,  w:9.5},
  {tf:'1M', sec:2592000, w:10.0},
];
const TFW = Object.fromEntries(TFS.map(t=>[t.tf,t.w]));
const TFSEC = Object.fromEntries(TFS.map(t=>[t.tf,t.sec]));
const DEFAULT_TFS = ['15m','1h','4h'];
let selectedTFs = new Set(DEFAULT_TFS);

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const tfGrid=$('tfGrid');
TFS.forEach(t=>{
  const el=document.createElement('div');
  el.className='tf'+(selectedTFs.has(t.tf)?' on':'');
  el.textContent=t.tf; el.dataset.tf=t.tf;
  el.onclick=()=>{ if(selectedTFs.has(t.tf)){selectedTFs.delete(t.tf);el.classList.remove('on');} else {selectedTFs.add(t.tf);el.classList.add('on');} updateEst(); };
  tfGrid.appendChild(el);
});

/* ---------- Yardımcılar ---------- */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const todayStr=()=>new Date().toISOString().slice(0,10);
function fmtPrice(p){ p=+p; if(p>=1000)return p.toLocaleString('en-US',{maximumFractionDigits:1}); if(p>=1)return p.toFixed(3); if(p>=0.01)return p.toFixed(5); if(p>=0.0001)return p.toFixed(7); return p.toPrecision(4);}
function lsGet(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

/* ---------- Rate limiter (ağırlık bazlı pacing) ---------- */
const WEIGHT_BUDGET=1800; // /dk güvenli tavan (limit 2400)
let winStart=Date.now(), wUsed=0;
async function gate(cost){
  while(true){
    const now=Date.now();
    if(now-winStart>=60000){winStart=now;wUsed=0;}
    if(wUsed+cost<=WEIGHT_BUDGET){wUsed+=cost;return;}
    await sleep(60000-(now-winStart)+60);
  }
}
async function fetchJSON(url,cost){
  for(let attempt=0;attempt<4;attempt++){
    await gate(cost);
    try{
      const r=await fetch(url);
      if(r.status===429||r.status===418){ await sleep(2000*(attempt+1)); winStart=Date.now(); wUsed=WEIGHT_BUDGET; continue; }
      if(!r.ok) throw new Error('HTTP '+r.status);
      return await r.json();
    }catch(e){ if(attempt===3) throw e; await sleep(700*(attempt+1)); }
  }
}
async function pool(items,worker,conc){
  let idx=0;
  async function next(){ if(idx>=items.length||cancel) return; const i=idx++; try{await worker(items[i],i);}catch(e){} return next(); }
  await Promise.all(Array.from({length:Math.min(conc,items.length)},next));
}

/* ---------- EMA yardımcısı ---------- */
function emaArr(arr,len){
  const k=2/(len+1); const out=new Array(arr.length); let prev=arr[0];
  for(let i=0;i<arr.length;i++){ prev = i===0?arr[0] : arr[i]*k+prev*(1-k); out[i]=prev; }
  return out;
}

/* ---------- 5 YÖNTEMLİ OB TESPİTİ (Pine indikatörü ile birebir aynı) ----------
   1) Swing OB Fitil  2) Swing OB Gövde  3) Hacim Pivot  4) Momentum/ROC  5) EMA Kesişim
   Her zone {top, btm, bull, method}. mitigation ile sadece aktif (kırılmamış) bölgeler döner. */
function detectAllOB(C, P){
  const n=C.length; const active=[];
  const sl=P.swing, emaSlow=P.emaFast+13;
  if(n < sl*2+6) return active;
  const O=C.map(x=>x.o),H=C.map(x=>x.h),L=C.map(x=>x.l),CL=C.map(x=>x.c),V=C.map(x=>x.v);
  const e1=P.useM[4]?emaArr(CL,P.emaFast):null, e2=P.useM[4]?emaArr(CL,emaSlow):null;
  const pc=new Array(n).fill(0);
  if(P.useM[3]) for(let i=4;i<n;i++){ pc[i]= O[i-4]!==0? (O[i]-O[i-4])/O[i-4]*100 : 0; }
  // ATR(14, Wilder) — yinelenen bölge elemesi için (indikatörle aynı eşik)
  const atrArr=new Array(n).fill(0);
  { let a=0; for(let i=1;i<n;i++){ const trI=Math.max(H[i]-L[i],Math.abs(H[i]-CL[i-1]),Math.abs(L[i]-CL[i-1])); a = i===1? trI : a+(trI-a)/14; atrArr[i]=a; } }
  let os=0,prevOs=0, topY=null,topX=null,topC=true, btmY=null,btmX=null,btmC=true;
  const addZ=(top,btm,bull,m,thr)=>{
    if(top<=btm) return;
    for(const z of active){ if(z.method===m && z.bull===bull && Math.abs(z.top-top)<thr && Math.abs(z.btm-btm)<thr) return; }
    active.push({top,btm,bull,method:m});
  };

  for(let i=sl;i<n;i++){
    let upper=-Infinity,lower=Infinity;
    for(let k=i-sl+1;k<=i;k++){ if(H[k]>upper)upper=H[k]; if(L[k]<lower)lower=L[k]; }
    const hb=H[i-sl], lb=L[i-sl];
    prevOs=os; os = hb>upper?0 : lb<lower?1 : os;
    if(os===0&&prevOs!==0){ topY=hb; topX=i-sl; topC=false; }
    if(os===1&&prevOs!==1){ btmY=lb; btmX=i-sl; btmC=false; }

    // M1/M2 — Swing OB (fitil + gövde) — Pine ile aynı: offset 1→lim (yeniden eskiye)
    if((P.useM[0]||P.useM[1]) && topY!==null && CL[i]>topY && !topC){
      topC=true; let minima=L[i-1],maxima=H[i-1],locOff=1;
      const lim=Math.max(1,Math.min((i-topX)-1,499));
      for(let off=1;off<=lim;off++){ if(L[i-off]<minima){minima=L[i-off];maxima=H[i-off];locOff=off;} }
      const loc=i-locOff;
      if(P.useM[0]) addZ(maxima,minima,true,1,atrArr[i]*0.15);
      if(P.useM[1]) addZ(Math.max(O[loc],CL[loc]),Math.min(O[loc],CL[loc]),true,2,atrArr[i]*0.15);
    }
    if((P.useM[0]||P.useM[1]) && btmY!==null && CL[i]<btmY && !btmC){
      btmC=true; let maxima=H[i-1],minima=L[i-1],locOff=1;
      const lim=Math.max(1,Math.min((i-btmX)-1,499));
      for(let off=1;off<=lim;off++){ if(H[i-off]>maxima){maxima=H[i-off];minima=L[i-off];locOff=off;} }
      const loc=i-locOff;
      if(P.useM[0]) addZ(maxima,minima,false,1,atrArr[i]*0.15);
      if(P.useM[1]) addZ(Math.max(O[loc],CL[loc]),Math.min(O[loc],CL[loc]),false,2,atrArr[i]*0.15);
    }

    // M3 — Hacim Pivot OB (pivothigh(volume, sl, sl))
    if(P.useM[2] && i-2*sl>=0){
      const c=i-sl; let isPiv=true;
      for(let k=1;k<=sl;k++){ if(V[c]<V[c+k]||V[c]<V[c-k]){isPiv=false;break;} }
      if(isPiv){
        const hl2c=(H[c]+L[c])/2;
        if(os===1) addZ(hl2c, L[c], true, 3, atrArr[i]*0.15);
        else if(os===0) addZ(H[c], hl2c, false, 3, atrArr[i]*0.15);
      }
    }

    // M4 — Momentum (ROC) OB
    if(P.useM[3] && i>=5){
      if(pc[i]>P.sensPc && pc[i-1]<=P.sensPc){
        for(let j=4;j<=15 && i-j>=0;j++){ if(CL[i-j]<O[i-j]){ addZ(H[i-j],L[i-j],true,4,atrArr[i]*0.15); break; } }
      }
      if(pc[i]<-P.sensPc && pc[i-1]>=-P.sensPc){
        for(let j=4;j<=15 && i-j>=0;j++){ if(CL[i-j]>O[i-j]){ addZ(H[i-j],L[i-j],false,4,atrArr[i]*0.15); break; } }
      }
    }

    // M5 — EMA Kesişim OB — Pine ile aynı: ta.lowest(emaSlow) mevcut barı dahil eder
    if(P.useM[4] && i>=emaSlow){
      const up = e1[i]>e2[i] && e1[i-1]<=e2[i-1];
      const dn = e1[i]<e2[i] && e1[i-1]>=e2[i-1];
      if(up||dn){
        let lowestV=Infinity,highestV=-Infinity;
        for(let k=0;k<emaSlow;k++){ if(L[i-k]<lowestV)lowestV=L[i-k]; if(H[i-k]>highestV)highestV=H[i-k]; }
        if(up){ for(let k=1;k<=emaSlow && i-k>=0;k++){ if(L[i-k]===lowestV){ addZ(Math.min(O[i-k],CL[i-k]),lowestV,true,5,atrArr[i]*0.15); break; } } }
        if(dn){ for(let k=1;k<=emaSlow && i-k>=0;k++){ if(H[i-k]===highestV){ addZ(highestV,Math.max(O[i-k],CL[i-k]),false,5,atrArr[i]*0.15); break; } } }
      }
    }

    // mitigation
    for(let z=active.length-1;z>=0;z--){
      const Z=active[z]; const v=Z.bull?(P.mitWick?L[i]:CL[i]):(P.mitWick?H[i]:CL[i]);
      if(Z.bull? v<Z.btm : v>Z.top) active.splice(z,1);
    }
    while(active.length>80) active.shift();   // Pine: maxZones = 80
  }
  return active;
}

/* ---------- Konfluens: TEK bir TF içinde kaç bölge (oy) aynı yeri gösteriyor
   (Pine indikatörüyle birebir aynı greedy + sayım) → onaylı bölgeler döner. */
function methodBands(zones, dir, minM, maxClusters){
  const Z=zones.filter(z=>z.bull===dir);
  if(!Z.length) return [];
  const cand=[];
  for(let a=0;a<Z.length;a++){
    const p=Z[a].btm; let lo=-Infinity,hi=Infinity,cnt=0; const mset={};
    for(let b=0;b<Z.length;b++){ if(Z[b].btm<=p&&Z[b].top>=p){ cnt++; if(Z[b].btm>lo)lo=Z[b].btm; if(Z[b].top<hi)hi=Z[b].top; mset[Z[b].method]=1; } }
    cand.push({lo,hi,cnt,methods:Object.keys(mset).map(Number)});
  }
  const used=new Array(cand.length).fill(false); const out=[];
  while(out.length<maxClusters){
    let bi=-1,bc=minM-1;
    for(let i=0;i<cand.length;i++){ if(!used[i]&&cand[i].cnt>bc){bc=cand[i].cnt;bi=i;} }
    if(bi<0) break;
    const s=cand[bi]; out.push(s);
    for(let i=0;i<cand.length;i++){ if(cand[i].lo<=s.hi && s.lo<=cand[i].hi) used[i]=true; }
  }
  return out;
}

/* ---------- Sinyal analizi: önce fiyatın İÇİNDE olduğu bölge, yoksa en yakın ---------- */
// Bir yöndeki (bull/bear) bölgeleri analiz eder. inside ise fiyatı kapsayan bölgelerin
// kesişimini ve O bölgelerin gerçek TF'lerini döner — böylece "İÇERİDE" hangi TF'den belli olur.
function analyzeDir(Z, price, bull){
  if(!Z.length) return null;
  const cont = Z.filter(z=>price>=z.btm && price<=z.top);
  if(cont.length){
    let lo=-Infinity,hi=Infinity; const tfMap={}; let mmax=0;
    cont.forEach(z=>{ if(z.btm>lo)lo=z.btm; if(z.top<hi)hi=z.top; tfMap[z.tf]=TFW[z.tf]||1; if(z.mcount>mmax)mmax=z.mcount; });
    const tfs=Object.keys(tfMap); const w=tfs.reduce((s,t)=>s+tfMap[t],0);
    return {dir:bull?'al':'sat', inside:1, dist:0, lo, hi, tfs, tfCount:tfs.length, mcount:mmax, w};
  }
  let best=null,bestD=Infinity,bestW=0;
  for(const z of Z){
    const d = price>z.top ? (price-z.top)/price*100 : (z.btm-price)/price*100;
    const zw = TFW[z.tf]||1;
    if(d<bestD || (Math.abs(d-bestD)<1e-9 && zw>bestW)){ bestD=d; bestW=zw; best=z; }
  }
  const tfMap={}; let mmax=best.mcount;
  Z.forEach(z=>{ if(z.btm<=best.top && z.top>=best.btm){ tfMap[z.tf]=TFW[z.tf]||1; if(z.mcount>mmax)mmax=z.mcount; } });
  const tfs=Object.keys(tfMap); const w=tfs.reduce((s,t)=>s+tfMap[t],0);
  return {dir:bull?'al':'sat', inside:0, dist:bestD, lo:best.btm, hi:best.top, tfs, tfCount:tfs.length, mcount:mmax, w};
}
function analyze(zones, price){
  const bull = analyzeDir(zones.filter(z=>z.bull), price, true);
  const bear = analyzeDir(zones.filter(z=>!z.bull), price, false);
  const res=[]; if(bull)res.push(bull); if(bear)res.push(bear);
  if(!res.length) return null;
  // İÇERİDE olanı tercih; ikisi de içerideyse daha çok yöntem onaylayanı; değilse en yakını
  res.sort((a,b)=> a.inside!==b.inside ? b.inside-a.inside : (a.inside? (b.mcount-a.mcount)||(b.w-a.w) : a.dist-b.dist));
  return res[0];
}
function _unused_strongestBand(zones,dir){
  const Z=zones.filter(z=>z.bull===dir);
  if(!Z.length) return null;
  let best=null;
  for(let a=0;a<Z.length;a++){
    const p=Z[a].btm; let lo=-Infinity,hi=Infinity; const tfMap={};
    for(let b=0;b<Z.length;b++){
      if(Z[b].btm<=p && Z[b].top>=p){
        if(Z[b].btm>lo)lo=Z[b].btm; if(Z[b].top<hi)hi=Z[b].top;
        tfMap[Z[b].tf]=TFW[Z[b].tf]||1;
      }
    }
    const tfs=Object.keys(tfMap); const w=tfs.reduce((s,t)=>s+tfMap[t],0);
    if(!best || w>best.w || (w===best.w && tfs.length>best.cnt)) best={lo,hi,w,cnt:tfs.length,tfs};
  }
  return best;
}

/* ---------- Durum ---------- */
let allSymbols=[];     // {symbol, vol, price, chg}
let results=[];        // satırlar
let cancel=false;
let sortKey='score', sortDir=-1;

/* ---------- Süre tahmini ---------- */
function updateEst(){
  const scope=+$('scope').value;
  const nSym = scope===0 ? (allSymbols.length||400) : Math.min(scope, allSymbols.length||scope);
  const reqs = nSym*selectedTFs.size;
  const lv=+$('limit').value; const cost = lv<=100?1:lv<=500?2:lv<=1000?5:10;
  const mins = (reqs*cost)/WEIGHT_BUDGET;
  $('est').textContent = selectedTFs.size? `~${reqs} istek · tahmini ${mins<1?'<1':Math.ceil(mins)} dk` : 'En az 1 zaman dilimi seç';
}

/* ---------- Sembol listesi + günlük yeni/delist kontrol ---------- */
async function loadSymbols(){
  $('symCount').textContent='yükleniyor…';
  const [info,tickers]=await Promise.all([
    fetchJSON(BASE+'/fapi/v1/exchangeInfo',1),
    fetchJSON(BASE+'/fapi/v1/ticker/24hr',40)
  ]);
  const live = info.symbols.filter(s=>s.contractType==='PERPETUAL'&&s.quoteAsset==='USDT'&&s.status==='TRADING').map(s=>s.symbol);
  const liveSet=new Set(live);
  const tmap=Object.fromEntries(tickers.map(t=>[t.symbol,t]));
  allSymbols = live.map(sym=>({
    symbol:sym,
    vol:+(tmap[sym]?.quoteVolume||0),
    price:+(tmap[sym]?.lastPrice||0),
    chg:+(tmap[sym]?.priceChangePercent||0)
  })).sort((a,b)=>b.vol-a.vol);
  $('symCount').textContent=live.length;
  updateEst();
}

/* ---------- Tarama ---------- */
async function scan(){
  if(!selectedTFs.size){ showErr('En az bir zaman dilimi seç.'); return; }
  cancel=false; results=[];
  $('scanBtn').disabled=true; $('stopBtn').disabled=false; $('err').style.display='none';
  $('progwrap').classList.add('show');
  $('stats').style.display='none'; $('tablewrap').style.display='none';

  const scope=+$('scope').value;
  const limit=+$('limit').value;
  const tfs=[...selectedTFs];
  // --- Sabit ayarlar (indikatörle aynı, değişmez) ---
  const P = { swing:10, mitWick:true, useM:[true,true,true,true,true], sensPc:1.5, emaFast:5 };
  const minMethod = 2;   // min. kesişim (oy)
  const MAXCL = 3;       // TF başına max onaylı bölge (indikatörle aynı)
  const cost=limit<=100?1:limit<=500?2:limit<=1000?5:10;

  let list = scope===0? allSymbols : allSymbols.slice(0,scope);
  let done=0; const total=list.length; const t0=Date.now();

  await pool(list, async(item)=>{
    if(cancel) return;
    const confirmed=[]; const livePrice=item.price;
    for(const tf of tfs){
      if(cancel) return;
      try{
        const kl=await fetchJSON(`${BASE}/fapi/v1/klines?symbol=${item.symbol}&interval=${tf}&limit=${limit}`,cost);
        // REPAINT YOK: oluşmakta olan son mumu at → sadece kapanmış mumlar (indikatör NR ile aynı)
        if(kl.length && +kl[kl.length-1][6] > Date.now()) kl.pop();
        const C=kl.map(r=>({o:+r[1],h:+r[2],l:+r[3],c:+r[4],v:+r[5]}));
        const zs=detectAllOB(C,P);                       // 5 yöntem, ham OB'ler
        for(const dir of [true,false]){
          const bands=methodBands(zs, dir, minMethod, MAXCL); // TF içi yöntem konfluensi
          bands.forEach(b=> confirmed.push({top:b.hi, btm:b.lo, bull:dir, tf, mcount:b.cnt, methods:b.methods}));
        }
      }catch(e){}
    }
    const price = livePrice || (confirmed.length? (confirmed[0].top+confirmed[0].btm)/2 : 0);
    const s = analyze(confirmed, price);
    if(s){
      results.push({symbol:item.symbol, price, chg:item.chg, ...s});
    }
    done++;
    const frac=done/total; $('pfill').style.width=(frac*100).toFixed(1)+'%';
    $('ptxt').innerHTML=`<span class="spin"></span> ${item.symbol} · ${done}/${total} coin`;
    const el=(Date.now()-t0)/1000; const eta=el/done*(total-done);
    $('petc').textContent=`geçen ${el.toFixed(0)}s · kalan ~${eta.toFixed(0)}s`;
  }, 12);

  finishScan(done,total);
}
function finishScan(done,total){
  $('scanBtn').disabled=false; $('stopBtn').disabled=true;
  $('ptxt').innerHTML = cancel? `Durduruldu · ${done}/${total}` : `✓ Tamamlandı · ${done}/${total} coin tarandı`;
  $('lastScan').textContent=new Date().toLocaleTimeString('tr-TR');
  applyFilterSort();
}

/* ---------- Filtre + sırala + render ---------- */
function applyFilterSort(){
  const dir=$('dir').value, minTf=+$('minTf').value, maxDist=+$('maxDist').value, onlyIn=$('onlyInside').checked;
  let rows=results.filter(r=>{
    if(dir==='al'&&r.dir!=='al')return false;
    if(dir==='sat'&&r.dir!=='sat')return false;
    if(r.tfCount<minTf)return false;
    if(onlyIn&&!r.inside)return false;
    if(!r.inside && r.dist>maxDist)return false;
    return true;
  });
  rows.forEach(r=>{ const prox=r.inside?1:Math.max(0,1-r.dist/(maxDist||10)); r.score=r.mcount*r.w*(0.4+0.6*prox)*(r.inside?1.5:1); });
  rows.sort((a,b)=>{
    let av,bv;
    switch(sortKey){
      case 'sym': av=a.symbol; bv=b.symbol; return sortDir*av.localeCompare(bv);
      case 'price': av=a.price;bv=b.price;break;
      case 'chg': av=a.chg;bv=b.chg;break;
      case 'dir': av=a.dir;bv=b.dir; return sortDir*av.localeCompare(bv);
      case 'dist': av=a.inside?-1:a.dist; bv=b.inside?-1:b.dist; break;
      case 'tfs': av=a.mcount*100+a.tfCount;bv=b.mcount*100+b.tfCount;break;
      default: av=a.score;bv=b.score;
    }
    return sortDir*(av-bv);
  });
  renderTable(rows);
  // stats
  $('stats').style.display='flex';
  $('stTot').textContent=rows.length;
  $('stAl').textContent=rows.filter(r=>r.dir==='al').length;
  $('stSat').textContent=rows.filter(r=>r.dir==='sat').length;
  $('stCf').textContent=rows.filter(r=>r.inside).length;
}
function renderTable(rows){
  $('tablewrap').style.display='block';
  const tb=$('tbody');
  if(!rows.length){ tb.innerHTML=`<tr><td colspan="9" class="empty">Filtrelere uyan sinyal yok. Mesafeyi artır ya da min. TF'yi düşür.</td></tr>`; return; }
  tb.innerHTML=rows.map((r,i)=>{
    const tv=`https://www.tradingview.com/chart/?symbol=BINANCE:${r.symbol}.P`;
    const sortedTfs = r.tfs.slice().sort((a,b)=>(TFW[b]||0)-(TFW[a]||0));
    const topTf = sortedTfs[0]||'';
    const pillClass = r.inside? 'pill '+r.dir+' inside' : 'pill '+r.dir;
    const base = r.dir==='al'?'AL':'SAT';
    const pillTxt = (r.inside? base+' · İÇERİDE' : base) + (topTf? ' · '+topTf : '');
    const distTxt = r.inside? '<span class="xcnt">İÇERİDE</span>' : r.dist.toFixed(2)+'%';
    const tfb = sortedTfs.map(t=>`<span class="tfb">${t}</span>`).join('');
    return `<tr>
      <td style="color:var(--muted2)">${i+1}</td>
      <td class="sym"><a href="${tv}" target="_blank">${r.symbol.replace('USDT','')}<span style="color:var(--muted2)">USDT</span></a></td>
      <td>${fmtPrice(r.price)}</td>
      <td class="${r.chg>=0?'pos':'neg'}">${r.chg>=0?'+':''}${r.chg.toFixed(2)}%</td>
      <td><span class="${pillClass}">${pillTxt}</span></td>
      <td>${fmtPrice(r.hi)} – ${fmtPrice(r.lo)}</td>
      <td>${distTxt}</td>
      <td>${tfb}</td>
      <td><div class="strength"><span class="xcnt" title="kesişen yöntem sayısı">x${r.mcount}</span><span style="color:var(--muted2);font-size:10px">${r.tfCount}TF</span><div class="sbar"><i style="width:${(r.mcount/5*100).toFixed(0)}%"></i></div></div></td>
    </tr>`;
  }).join('');
}
function showErr(m){ const e=$('err'); e.textContent='⚠ '+m; e.style.display='block'; }

/* ---------- Events ---------- */
$('scanBtn').onclick=scan;
$('stopBtn').onclick=()=>{cancel=true;};
['scope','limit'].forEach(id=>$(id).onchange=updateEst);
['dir','minTf','maxDist','onlyInside'].forEach(id=>$(id).addEventListener('change',()=>{ if(results.length) applyFilterSort(); }));
document.querySelectorAll('thead th').forEach(th=>{
  th.onclick=()=>{ const k=th.dataset.k; if(k==='rank')return; if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=(k==='sym'||k==='dist')?1:-1;}
    document.querySelectorAll('thead th .ar').forEach(a=>a.remove());
    const ar=document.createElement('span'); ar.className='ar'; ar.textContent=sortDir<0?' ▼':' ▲'; th.appendChild(ar);
    if(results.length) applyFilterSort(); };
});

/* ---------- Başlat ---------- */
loadSymbols().catch(e=>showErr('Sembol listesi alınamadı: '+e.message+' (bağlantı/CORS kontrol et)'));
</script>
