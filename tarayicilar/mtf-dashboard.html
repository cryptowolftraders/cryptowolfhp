function renderOBModal(body, ob, trades, currentPrice, symbol, oi, oiHist, lsRatio, taker, aggTrades, btcTaker) {
  const asks = ob.asks.slice(0,10).map(a => ({ price: parseFloat(a[0]), qty: parseFloat(a[1]) }));
  const bids = ob.bids.slice(0,10).map(b => ({ price: parseFloat(b[0]), qty: parseFloat(b[1]) }));
  const bidVol   = bids.reduce((s,b) => s + b.qty * b.price, 0);
  const askVol   = asks.reduce((s,a) => s + a.qty * a.price, 0);
  const totalVol = bidVol + askVol;
  const buyPct   = totalVol > 0 ? (bidVol / totalVol * 100) : 50;
  const bestAsk  = asks[0]?.price || 0;
  const bestBid  = bids[0]?.price || 0;
  const spread   = bestAsk - bestBid;
  const spreadPct= bestBid > 0 ? (spread / bestBid * 100) : 0;

  const buyTrades    = trades.filter(t => !t.isBuyerMaker);
  const sellTrades   = trades.filter(t =>  t.isBuyerMaker);
  const buyTradeVol  = buyTrades.reduce((s,t)  => s + parseFloat(t.qty)*parseFloat(t.price), 0);
  const sellTradeVol = sellTrades.reduce((s,t) => s + parseFloat(t.qty)*parseFloat(t.price), 0);
  const tradeTotal   = buyTradeVol + sellTradeVol;
  const tradeBuyPct  = tradeTotal > 0 ? (buyTradeVol / tradeTotal * 100) : 50;
  const allQtys      = trades.map(t => parseFloat(t.qty)*parseFloat(t.price));
  allQtys.sort((a,b) => b-a);
  const bigThreshold = allQtys[Math.floor(allQtys.length*0.2)] || 0;

  // Open Interest
  const oiNow   = oi ? parseFloat(oi.openInterest) * currentPrice : 0;
  let oiChange  = 0, oiTrend = '—';
  if (oiHist && oiHist.length >= 2) {
    const newest = parseFloat(oiHist[oiHist.length-1].sumOpenInterest) * currentPrice;
    const oldest = parseFloat(oiHist[0].sumOpenInterest) * currentPrice;
    oiChange = oldest > 0 ? ((newest - oldest) / oldest * 100) : 0;
    oiTrend  = oiChange > 2 ? '▲ ARTIYOR' : oiChange < -2 ? '▼ AZALIYOR' : '➡ SABIT';
  }

  // Long/Short
  const ls       = lsRatio && lsRatio[0];
  const longPct  = ls ? parseFloat(ls.longAccount)  * 100 : 50;
  const shortPct = ls ? parseFloat(ls.shortAccount) * 100 : 50;

  // Taker (son 6 saat)
  let takerBuyTotal = 0, takerSellTotal = 0;
  if (taker && taker.length > 0) {
    taker.forEach(t => {
      takerBuyTotal  += parseFloat(t.buyVol)  * currentPrice;
      takerSellTotal += parseFloat(t.sellVol) * currentPrice;
    });
  }
  const takerTotal  = takerBuyTotal + takerSellTotal;
  const takerBuyPct = takerTotal > 0 ? (takerBuyTotal / takerTotal * 100) : 50;

  // Skor
  const combinedBuy = (buyPct*0.3) + (tradeBuyPct*0.3) + (takerBuyPct*0.4);
  let verdictClass, verdictText, verdictNote;
  if      (combinedBuy >= 68) { verdictClass='strong-buy';  verdictText='🟢 GÜÇLÜ ALIM BASKISI';  verdictNote='Para giriyor — sinyal GÜVENİLİR'; }
  else if (combinedBuy >= 55) { verdictClass='weak-buy';    verdictText='🟢 ALIM BASKISI VAR';     verdictNote='Hafif alım üstünlüğü var'; }
  else if (combinedBuy >= 45) { verdictClass='neutral-p';   verdictText='🟡 NÖTR — BEKLE';         verdictNote='Net bir yön yok, giriş riskli'; }
  else if (combinedBuy >= 32) { verdictClass='weak-sell';   verdictText='🔴 SATIM BASKISI VAR';    verdictNote='Para çıkıyor — sinyale rağmen riskli'; }
  else                        { verdictClass='strong-sell'; verdictText='🔴 GÜÇLÜ SATIM BASKISI';  verdictNote='Büyük para çıkışı var — GIRME'; }

  const maxBidUsd = Math.max(...bids.map(b => b.qty*b.price));
  const maxAskUsd = Math.max(...asks.map(a => a.qty*a.price));
  const oiChangeCol = oiChange > 0 ? 'var(--green)' : oiChange < 0 ? 'var(--red)' : 'var(--yellow)';
  const lsCol       = longPct > 55 ? 'var(--green)' : longPct < 45 ? 'var(--red)' : 'var(--yellow)';
  const tkCol       = takerBuyPct > 55 ? 'var(--green)' : takerBuyPct < 45 ? 'var(--red)' : 'var(--yellow)';

  let html = `
    <div class="pressure-verdict ${verdictClass}">${verdictText}<br>
      <span style="font-size:9px;font-weight:400;opacity:0.8">${verdictNote}</span>
    </div>

    <div class="ob-section-title">💰 PARA GİRİŞ / ÇIKIŞ ANALİZİ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">

      <div style="background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:4px">📈 OPEN INTEREST</div>
        <div style="font-size:13px;font-weight:700;color:white">$${fmtMB(oiNow)}</div>
        <div style="font-size:9px;color:${oiChangeCol};margin-top:2px">${oiTrend} ${oiChange !== 0 ? (oiChange>0?'+':'')+oiChange.toFixed(2)+'% (6s)' : ''}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:3px">${oiChange > 2 ? '→ Yeni para giriyor' : oiChange < -2 ? '→ Pozisyon kapatılıyor' : '→ Sabit seyir'}</div>
      </div>

      <div style="background:rgba(45,212,191,0.05);border:1px solid rgba(45,212,191,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:4px">👥 LONG/SHORT ORANI</div>
        <div style="font-size:13px;font-weight:700;color:${lsCol}">%${longPct.toFixed(1)} L / %${shortPct.toFixed(1)} S</div>
        <div style="margin-top:4px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${longPct}%;background:var(--green);border-radius:2px"></div>
        </div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:3px">${longPct > 65 ? '⚠ Aşırı LONG — dikkat' : longPct < 35 ? '⚠ Aşırı SHORT — dikkat' : '→ Dengeli pozisyon'}</div>
      </div>

      <div style="background:rgba(245,179,66,0.05);border:1px solid rgba(245,179,66,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:4px">⚡ TAKER HACMİ (6 saat)</div>
        <div style="font-size:11px;font-weight:700;color:${tkCol}">AL: $${fmtMB(takerBuyTotal)}</div>
        <div style="font-size:11px;font-weight:700;color:var(--red)">SAT: $${fmtMB(takerSellTotal)}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:3px">${takerBuyPct > 55 ? '→ Agresif alım var' : takerBuyPct < 45 ? '→ Agresif satış var' : '→ Dengeli'}</div>
      </div>

      <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:4px">📊 EMİR DEFTERİ</div>
        <div style="font-size:11px;font-weight:700;color:var(--green)">AL: $${fmtMB(bidVol)}</div>
        <div style="font-size:11px;font-weight:700;color:var(--red)">SAT: $${fmtMB(askVol)}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:3px">Spread: ${spreadPct.toFixed(3)}%</div>
      </div>
    </div>

    <div class="ob-section-title">TAKER ALIM/SATIM ORANI (6s)</div>
    <div class="pressure-bar-wrap">
      <div class="pressure-buy"  style="width:${takerBuyPct.toFixed(1)}%"></div>
      <div class="pressure-sell" style="width:${(100-takerBuyPct).toFixed(1)}%"></div>
    </div>
    <div class="pressure-labels">
      <span>▲ ALIM %${takerBuyPct.toFixed(1)}</span>
      <span>SATIŞ %${(100-takerBuyPct).toFixed(1)} ▼</span>
    </div>

    ${renderCVD(aggTrades, currentPrice)}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
      <div>
        <div class="ob-section-title" style="color:var(--red)">SATIŞ EMİRLERİ ($0.10 grp)</div>
        <table class="ob-table">
          <tr><th>FİYAT ARALIĞI</th><th>$</th></tr>
          ${groupOB(asks, 0.10, 'ask', currentPrice).slice(0,6).map(g => {
            const barW = g.maxUsd > 0 ? (g.usd/g.maxUsd*100) : 0;
            return '<tr class="ob-row-ask"><td>$' + g.label + '</td><td style="position:relative"><div class="ob-bar-bg ask" style="width:' + barW + '%"></div>' + fmtMB(g.usd) + '</td></tr>';
          }).join('')}
        </table>
      </div>
      <div>
        <div class="ob-section-title" style="color:var(--green)">ALIM EMİRLERİ ($0.10 grp)</div>
        <table class="ob-table">
          <tr><th>FİYAT ARALIĞI</th><th>$</th></tr>
          ${groupOB(bids, 0.10, 'bid', currentPrice).slice(0,6).map(g => {
            const barW = g.maxUsd > 0 ? (g.usd/g.maxUsd*100) : 0;
            return '<tr class="ob-row-bid"><td>$' + g.label + '</td><td style="position:relative"><div class="ob-bar-bg bid" style="width:' + barW + '%"></div>' + fmtMB(g.usd) + '</td></tr>';
          }).join('')}
        </table>
      </div>
    </div>

    <div class="ob-section-title" style="margin-top:14px">★ EN BÜYÜK 3 İŞLEM</div>
    <div>
      ${[...trades].sort((a,b) => parseFloat(b.qty)*parseFloat(b.price) - parseFloat(a.qty)*parseFloat(a.price)).slice(0,3).map(t => {
        const isBuy = !t.isBuyerMaker;
        const price = parseFloat(t.price);
        const qty   = parseFloat(t.qty);
        const usd   = qty * price;
        const time  = new Date(t.time).toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        return '<div class="trade-row ' + (isBuy?'buy':'sell') + '"><span class="trade-side trade-big">' + (isBuy?'▲':'▼') + ' ★</span><span class="trade-price">$' + price + '</span><span class="trade-qty">' + qty.toFixed(3) + '</span><span class="trade-qty" style="color:' + (isBuy?'var(--green)':'var(--red)') + '">$' + fmtMB(usd) + '</span><span class="trade-time">' + time + '</span></div>';
      }).join('')}
    </div>
    ${renderLiqMap(ob, oiHist, currentPrice)}
    ${renderBTCCorr(btcTaker, takerBuyPct)}
  `;
  body.innerHTML = html;
}

function renderBTCCorr(btcTaker, coinTakerBuyPct) {
  if (!btcTaker || !btcTaker[0]) return '';
  const btcBuy = parseFloat(btcTaker[0].buyVol);
  const btcSell = parseFloat(btcTaker[0].sellVol);
  const btcBuyPct = btcBuy / (btcBuy + btcSell) * 100;
  const diff = Math.abs(coinTakerBuyPct - btcBuyPct);
  const btcDir = btcBuyPct > 55 ? '▲ ALIM' : btcBuyPct < 45 ? '▼ SATIM' : '→ NÖTR';
  const btcCol = btcBuyPct > 55 ? 'var(--green)' : btcBuyPct < 45 ? 'var(--red)' : 'var(--yellow)';
  const coinDir = coinTakerBuyPct > 55 ? '▲ ALIM' : coinTakerBuyPct < 45 ? '▼ SATIM' : '→ NÖTR';
  const coinCol = coinTakerBuyPct > 55 ? 'var(--green)' : coinTakerBuyPct < 45 ? 'var(--red)' : 'var(--yellow)';

  // Uyum analizi
  const btcLong  = btcBuyPct > 52;
  const btcShort = btcBuyPct < 48;
  const coinLong  = coinTakerBuyPct > 52;
  const coinShort = coinTakerBuyPct < 48;

  let corrNote, corrCol;
  if (btcLong && coinLong)   { corrNote = '✅ BTC ile UYUMLU — İki taraf da alım baskısında, long destekli'; corrCol = 'var(--green)'; }
  else if (btcShort && coinShort) { corrNote = '✅ BTC ile UYUMLU — İki taraf da satım baskısında, short destekli'; corrCol = 'var(--red)'; }
  else if (btcLong && coinShort)  { corrNote = '⚠ AYRIŞMA — BTC alımda ama bu coin satımda, dikkatli ol'; corrCol = 'var(--yellow)'; }
  else if (btcShort && coinLong)  { corrNote = '⚠ AYRIŞMA — BTC satımda ama bu coin alımda, dikkatli ol'; corrCol = 'var(--yellow)'; }
  else { corrNote = '→ Her ikisi de nötr bölgede'; corrCol = 'var(--text-dim)'; }

  return `
    <div class="ob-section-title" style="margin-top:14px">₿ BTC KORELASYONu</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="background:rgba(245,179,66,0.05);border:1px solid rgba(245,179,66,0.2);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:3px">BTC TAKER (1H)</div>
        <div style="font-size:13px;font-weight:700;color:${btcCol}">${btcBuyPct.toFixed(1)}% ${btcDir}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:2px">Alım: %${btcBuyPct.toFixed(0)} / Satım: %${(100-btcBuyPct).toFixed(0)}</div>
      </div>
      <div style="background:rgba(45,212,191,0.05);border:1px solid rgba(45,212,191,0.2);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:3px">BU KOİN TAKER (6H)</div>
        <div style="font-size:13px;font-weight:700;color:${coinCol}">${coinTakerBuyPct.toFixed(1)}% ${coinDir}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:2px">Fark: %${diff.toFixed(1)}</div>
      </div>
    </div>
    <div style="font-size:9px;font-weight:600;padding:6px 8px;border-radius:3px;border:1px solid var(--border);color:${corrCol}">${corrNote}</div>`;
}

function renderLiqMap(ob, oiHist, currentPrice) {
  // OI değişimi — ani düşüş = likidasyon oldu
  let oiDropHtml = '';
  if (oiHist && oiHist.length >= 2) {
    const oiVals = oiHist.map(o => parseFloat(o.sumOpenInterest));
    const drops = [];
    for (let i = 1; i < oiVals.length; i++) {
      const chg = (oiVals[i] - oiVals[i-1]) / oiVals[i-1] * 100;
      if (chg < -1.5) drops.push({ hour: i, chg: chg.toFixed(2) });
    }
    if (drops.length > 0) {
      oiDropHtml = drops.map(d =>
        '<div style="font-size:9px;color:var(--red)">⚡ ' + Math.abs(d.chg) + '% OI düştü (' + d.hour + 's önce) → Likidasyon yaşandı</div>'
      ).join('');
    } else {
      oiDropHtml = '<div style="font-size:9px;color:var(--text-dim)">Son 6 saatte büyük likidasyon görünmüyor</div>';
    }
  }

  // Emir defteri boşluk analizi — ince bölgeler = stop hunt hedefi
  const asks = ob.asks ? ob.asks.slice(0,20).map(a => ({ p: parseFloat(a[0]), usd: parseFloat(a[0])*parseFloat(a[1]) })) : [];
  const bids = ob.bids ? ob.bids.slice(0,20).map(b => ({ p: parseFloat(b[0]), usd: parseFloat(b[0])*parseFloat(b[1]) })) : [];

  // En ince (en az likidite) ve en kalın (en fazla likidite) seviyeleri bul
  const sortedAsks = [...asks].sort((a,b) => a.usd - b.usd);
  const sortedBids = [...bids].sort((a,b) => a.usd - b.usd);
  const thinAsk  = sortedAsks[0];   // en ince üst seviye = fiyat kolayca geçebilir
  const thickAsk = [...asks].sort((a,b) => b.usd - a.usd)[0]; // en kalın duvar
  const thinBid  = sortedBids[0];
  const thickBid = [...bids].sort((a,b) => b.usd - a.usd)[0];

  const thinAskDist  = thinAsk  ? ((thinAsk.p  - currentPrice) / currentPrice * 100).toFixed(2) : null;
  const thickAskDist = thickAsk ? ((thickAsk.p - currentPrice) / currentPrice * 100).toFixed(2) : null;
  const thinBidDist  = thinBid  ? ((thinBid.p  - currentPrice) / currentPrice * 100).toFixed(2) : null;
  const thickBidDist = thickBid ? ((thickBid.p - currentPrice) / currentPrice * 100).toFixed(2) : null;

  return `
    <div class="ob-section-title" style="margin-top:14px">💥 LİKİDASYON & STOP HUNT ANALİZİ</div>
    <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:3px;padding:8px;margin-bottom:6px">
      <div style="font-size:8px;color:var(--text-dim);margin-bottom:4px;letter-spacing:1px">OI DEĞİŞİMİ (Son 6 Saat)</div>
      ${oiDropHtml}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:5px;letter-spacing:1px">YUKARI — STOP HUNT BÖLGELERİ</div>
        ${thinAsk ? '<div style="font-size:9px;margin-bottom:3px">🕳 <span style="color:var(--yellow)">İNCE BÖLGE:</span> <b>$' + thinAsk.p.toFixed(4) + '</b> <span style="color:var(--text-dim)">(+' + thinAskDist + '%) — $' + fmtMB(thinAsk.usd) + ' likidite</span></div>' : ''}
        ${thickAsk ? '<div style="font-size:9px">🧱 <span style="color:var(--red)">BÜYÜK DUVAR:</span> <b>$' + thickAsk.p.toFixed(4) + '</b> <span style="color:var(--text-dim)">(+' + thickAskDist + '%) — $' + fmtMB(thickAsk.usd) + '</span></div>' : ''}
        <div style="font-size:8px;color:var(--text-dim);margin-top:5px">→ İnce bölge aşılırsa fiyat hızlanır, duvar direniyor</div>
      </div>
      <div style="background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:3px;padding:8px">
        <div style="font-size:8px;color:var(--text-dim);margin-bottom:5px;letter-spacing:1px">AŞAĞI — STOP HUNT BÖLGELERİ</div>
        ${thinBid ? '<div style="font-size:9px;margin-bottom:3px">🕳 <span style="color:var(--yellow)">İNCE BÖLGE:</span> <b>$' + thinBid.p.toFixed(4) + '</b> <span style="color:var(--text-dim)">(' + thinBidDist + '%) — $' + fmtMB(thinBid.usd) + ' likidite</span></div>' : ''}
        ${thickBid ? '<div style="font-size:9px">🧱 <span style="color:var(--green)">BÜYÜK DESTEK:</span> <b>$' + thickBid.p.toFixed(4) + '</b> <span style="color:var(--text-dim)">(' + thickBidDist + '%) — $' + fmtMB(thickBid.usd) + '</span></div>' : ''}
        <div style="font-size:8px;color:var(--text-dim);margin-top:5px">→ İnce bölge kırılırsa long stopları tetiklenir</div>
      </div>
    </div>`;
}


function renderCVD(aggTrades, currentPrice) {
  if (!aggTrades || aggTrades.length < 5) return '';
  let cvd = 0, buyUsd = 0, sellUsd = 0;
  const pts = [];
  aggTrades.forEach(t => {
    const usd   = parseFloat(t.q) * parseFloat(t.p);
    const isBuy = !t.m; // m=true → buyer is maker = sell taker
    if (isBuy) { cvd += usd; buyUsd += usd; }
    else        { cvd -= usd; sellUsd += usd; }
    pts.push(cvd);
  });
  const rising  = pts[pts.length-1] > pts[0];
  const cvdCol  = rising ? 'var(--green)' : 'var(--red)';
  const trend   = rising ? '▲ YÜKSELİYOR' : '▼ DÜŞÜYOR';
  // Divergence: fiyat yukarı ama CVD aşağı = bearish div (veya tersi)
  const priceUp = parseFloat(aggTrades[aggTrades.length-1].p) > parseFloat(aggTrades[0].p);
  const div = (priceUp && !rising) ? '<span style="color:var(--red);font-weight:700"> ⚠ BEARISH DIV</span>'
            : (!priceUp && rising)  ? '<span style="color:var(--green);font-weight:700"> ⚠ BULLISH DIV</span>'
            : '';
  // Sparkline
  const min = Math.min(...pts), max = Math.max(...pts), range = max - min || 1;
  const W = 200, H = 36, step = W / (pts.length - 1);
  const polyPts = pts.map((v,i) => (i*step).toFixed(1) + ',' + (H - (v-min)/range*H).toFixed(1)).join(' ');
  return `
    <div class="ob-section-title" style="margin-top:14px">📊 CVD — KÜMÜLATİF HACİM DELTASI${div}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div style="background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.15);border-radius:3px;padding:6px">
        <div style="font-size:8px;color:var(--text-dim)">TAKER ALIM</div>
        <div style="font-size:13px;font-weight:700;color:var(--green)">$${fmtMB(buyUsd)}</div>
      </div>
      <div style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15);border-radius:3px;padding:6px">
        <div style="font-size:8px;color:var(--text-dim)">TAKER SATIM</div>
        <div style="font-size:13px;font-weight:700;color:var(--red)">$${fmtMB(sellUsd)}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="${W}" height="${H}" style="border:1px solid var(--border);border-radius:2px;background:rgba(0,0,0,0.3);flex-shrink:0">
        <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="rgba(255,255,255,0.08)" stroke-dasharray="2,2"/>
        <polyline points="${polyPts}" fill="none" stroke="${cvdCol}" stroke-width="1.5"/>
      </svg>
      <div>
        <div style="font-size:10px;color:${cvdCol};font-weight:700">${trend}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:3px">${rising ? '→ Alım baskısı birikmiş' : '→ Satım baskısı birikmiş'}</div>
        <div style="font-size:8px;color:var(--text-dim);margin-top:2px">Net: $${fmtMB(Math.abs(pts[pts.length-1]))}</div>
      </div>
    </div>`;
}

function groupOB(levels, step, side, refPrice) {
  // Fiyatları 0.10 aralıklarla gruplandır
  const groups = {};
  levels.forEach(l => {
    const bucket = Math.floor(l.price / step) * step;
    const key    = bucket.toFixed(2);
    if (!groups[key]) groups[key] = { price: bucket, usd: 0 };
    groups[key].usd += l.qty * l.price;
  });

  // Sırala: ask = artan (fiyat düşükten yükseğe), bid = azalan
  let sorted = Object.values(groups).sort((a,b) =>
    side === 'ask' ? a.price - b.price : b.price - a.price
  );

  // Dinamik label formatı — fiyata göre adım
  const labelStep = step >= 1 ? step.toFixed(0) : step.toFixed(2);
  sorted = sorted.map(g => ({
    ...g,
    label: '$' + g.price.toFixed(2) + ' – ' + (g.price + step).toFixed(2)
  }));

  // maxUsd hesapla (bar genişliği için)
  const maxUsd = Math.max(...sorted.map(g => g.usd));
  return sorted.map(g => ({ ...g, maxUsd }));
}

function fmtMB(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return v.toFixed(0);
}
</script>
