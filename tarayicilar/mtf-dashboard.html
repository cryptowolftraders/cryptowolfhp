<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐺 Wolf MTF Trend Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #121826;
    --border: #1f2740;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f5b342;
    --blue: #2dd4bf;
    --dim: #1f2740;
    --text: #e8edf5;
    --text-dim: #8892a8;
    --teal: #2dd4bf;
    --gold: #f5b342;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(34,197,94,0.03) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(45,212,191,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 1;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(18,24,38,0.95);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .wolf-logo-img {
    width: 40px;
    height: 40px;
    filter: drop-shadow(0 0 6px rgba(45,212,191,0.55)) drop-shadow(0 0 12px rgba(45,212,191,0.3));
  }
  .logo-wordmark {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--teal);
    letter-spacing: 2px;
    text-shadow: 0 0 16px rgba(45,212,191,0.45);
    line-height: 1.15;
  }

  .logo span { color: var(--text-dim); font-size: 11px; display: block; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; font-weight: 300; margin-top: 2px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    box-shadow: none;
    transition: all 0.3s;
  }
  .status-dot.live {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .refresh-btn:hover { border-color: var(--green); color: var(--green); }
  .refresh-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .controls {
    position: relative;
    z-index: 1;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    background: rgba(18,24,38,0.8);
  }

  .ctrl-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

  .ctrl-group { display: flex; align-items: center; gap: 8px; }

  .ctrl-input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    width: 60px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ctrl-input:focus { border-color: var(--green); }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .filter-btn.active-green { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .filter-btn.active-red   { border-color: var(--red);   color: var(--red);   background: rgba(239,68,68,0.08); }
  .filter-btn.active-all   { border-color: var(--blue);  color: var(--blue);  background: rgba(45,212,191,0.08); }

  .stats-bar {
    position: relative; z-index: 1;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 24px;
    background: rgba(10,14,26,0.9);
    flex-wrap: wrap;
  }

  .stat { font-size: 10px; letter-spacing: 0.5px; }
  .stat-val { font-weight: 700; }
  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red); }
  .stat-val.blue  { color: var(--blue); }

  .grid-container {
    position: relative; z-index: 1;
    padding: 16px 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .coin-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    transition: all 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .coin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--dim);
    transition: background 0.3s;
  }

  .coin-card.long::before  { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }
  .coin-card.short::before { background: var(--red);   box-shadow: 0 0 8px rgba(239,68,68,0.4); }
  .coin-card.neutral::before { background: var(--yellow); }

  .coin-card:hover {
    border-color: rgba(232,237,245,0.2);
    transform: translateY(-1px);
  }

  .coin-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .coin-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
  }

  .coin-signal {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 2px;
  }
  .coin-signal.long  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .coin-signal.short { background: rgba(239,68,68,0.15);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }
  .coin-signal.neutral { background: rgba(245,179,66,0.10); color: var(--yellow); border: 1px solid rgba(245,179,66,0.2); }

  .coin-price {
    font-size: 14px;
    font-weight: 500;
    color: white;
    margin-bottom: 6px;
  }

  .coin-change {
    font-size: 11px;
    margin-left: 6px;
    font-weight: 400;
  }
  .coin-change.pos { color: var(--green); }
  .coin-change.neg { color: var(--red); }
  .funding-badge { display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;margin-left:5px;letter-spacing:0.3px; }
  .funding-pos { background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3); }
  .funding-neg { background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3); }
  .funding-neu { background:rgba(245,179,66,0.10);color:var(--yellow);border:1px solid rgba(245,179,66,0.2); }

  .ti-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }

  .ti-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }

  .ti-bar-wrap {
    flex: 1;
    margin: 0 6px;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .ti-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .ti-val {
    font-size: 10px;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
  }

  .ti-val.long-zone  { color: var(--green); }
  .ti-val.short-zone { color: var(--red); }
  .ti-val.neutral    { color: var(--yellow); }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,14,26,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }

  .loading-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 30px rgba(34,197,94,0.6);
    animation: glow 1.5s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(34,197,94,0.4); }
    50% { text-shadow: 0 0 40px rgba(34,197,94,0.9); }
  }

  .loading-bar-wrap {
    width: 280px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 1px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--green);
  }

  .loading-text { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 3px;
    padding: 12px 16px;
    color: var(--red);
    font-size: 11px;
    margin: 16px 24px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  .last-update {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .volume-chip {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .rank-badge {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 9px;
    color: var(--blue);
    letter-spacing: 0.5px;
    font-weight: 700;
    text-shadow: 0 0 6px rgba(45,212,191,0.4);
  }

  /* ── DCA PANEL ── */
  .dca-panel {
    margin-top: 8px;
    padding-top: 7px;
    border-top: 1px solid var(--border);
  }
  .dca-dots {
    display: flex; gap: 3px; margin-bottom: 5px;
  }
  .dca-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid var(--dim);
    background: transparent;
    transition: all 0.2s;
  }
  .dca-dot.filled { background: var(--green); border-color: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.5); }
  .dca-info { font-size: 8px; color: var(--text-dim); margin-bottom: 5px; line-height: 1.6; }
  .dca-info span { color: var(--text); }
  .dca-pnl { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .dca-pnl.profit { color: var(--green); }
  .dca-pnl.loss   { color: var(--red); }
  .dca-pnl.neutral { color: var(--text-dim); }

  .dca-btn {
    width: 100%; padding: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer;
    border-radius: 2px; border: none;
    transition: all 0.15s;
  }
  .dca-btn.buy  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .dca-btn.buy:hover { background: rgba(34,197,94,0.25); }
  .dca-btn.buy:disabled { opacity: 0.3; cursor: not-allowed; }
  .dca-btn.sell { background: rgba(34,197,94,0.9); color: #000; border: 1px solid var(--green); animation: sellPulse 1s infinite; }
  .dca-btn.stop { background: rgba(239,68,68,0.9);  color: #fff; border: 1px solid var(--red);   animation: sellPulse 1s infinite; }
  .dca-btn.clear { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 3px; }
  .dca-btn.clear:hover { color: var(--red); border-color: var(--red); }

  @keyframes sellPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .dca-alert-sell {
    position: absolute; inset: 0;
    background: rgba(34,197,94,0.08);
    border: 1px solid var(--green);
    border-radius: 3px;
    pointer-events: none;
    animation: borderPulse 1s infinite;
  }
  .dca-alert-stop {
    position: absolute; inset: 0;
    background: rgba(239,68,68,0.08);
    border: 1px solid var(--red);
    border-radius: 3px;
    pointer-events: none;
    animation: borderPulse 1s infinite;
  }
  @keyframes borderPulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── 4H FVG ROZET ── */
  .fvg-badge {
    width: 100%;
    margin-top: 5px;
    padding: 5px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-align: center;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .fvg-bull {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.5);
    color: #22c55e;
    box-shadow: 0 0 10px rgba(34,197,94,0.15), inset 0 0 8px rgba(34,197,94,0.05);
    animation: fvgPulse 2s infinite;
  }
  .fvg-bear {
    background: rgba(239,68,68,0.12);
    border-color: rgba(239,68,68,0.5);
    color: #ef4444;
    box-shadow: 0 0 10px rgba(239,68,68,0.15), inset 0 0 8px rgba(239,68,68,0.05);
    animation: fvgPulse 2s infinite;
  }
  .fvg-near {
    background: rgba(245,179,66,0.07);
    border-color: rgba(245,179,66,0.25);
    color: #f5b342;
    font-size: 10px;
  }
  @keyframes fvgPulse {
    0%,100% { box-shadow: 0 0 8px rgba(34,197,94,0.15); }
    50% { box-shadow: 0 0 16px rgba(34,197,94,0.3); }
  }
  .fvg-range {
    font-size: 9px;
    opacity: 0.75;
    font-weight: 400;
    letter-spacing: 0;
  }

  /* ── 🐺 OB ORACLE · MTF ── */
  .ob-mtf {
    width: 100%; margin-top: 6px;
    border: 1px solid var(--border); border-radius: 3px;
    background: rgba(18,24,38,0.55); overflow: hidden;
  }
  .ob-head {
    font-size: 9.5px; font-weight: 800; letter-spacing: 1.2px;
    text-align: center; padding: 4px; color: #8892a8;
    background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
  }
  .ob-head-hot {
    color: #121826;
    background: linear-gradient(90deg, var(--yellow), #f5b342);
    animation: fiboPulse 1.6s infinite;
  }
  .ob-row {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 4px; row-gap: 1px;
    padding: 4px 7px; font-size: 10.5px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .ob-row:last-child { border-bottom: none; }
  .ob-tf {
    width: 22px; font-weight: 800; color: #8892a8;
    font-family: 'Orbitron', sans-serif; font-size: 9.5px; flex-shrink: 0;
  }
  .ob-side { font-weight: 800; min-width: 60px; flex-shrink: 0; font-size: 10px; }
  .ob-bull { color: var(--green); }
  .ob-bear { color: #ef4444; }
  .ob-vol {
    flex: 1 1 auto; min-width: 0; text-align: right;
    color: #e8edf5; font-weight: 700; font-size: 10px; white-space: nowrap;
  }
  .ob-usd { font-size: 8.5px; color: #8892a8; font-weight: 500; margin-left: 4px; }
  .ob-stat {
    margin-left: auto; text-align: right;
    color: #8892a8; font-weight: 700; font-size: 9.5px; flex-shrink: 0;
  }
  .ob-retest { color: var(--yellow); font-weight: 900; }
  .ob-empty {
    flex: 1; text-align: right; color: #1f2740; font-size: 10px; font-weight: 500;
  }


  /* ── FİBO ZONE ── */
  .fibo-golden {
    width:100%; margin-top:5px; padding:5px 8px; border-radius:3px;
    font-size:11px; font-weight:800; letter-spacing:0.8px; text-align:center;
    background:rgba(245,179,66,0.12); border:1px solid rgba(245,179,66,0.5);
    color:#f5b342; animation:fiboPulse 2s infinite;
  }
  .fibo-ext {
    width:100%; margin-top:5px; padding:5px 8px; border-radius:3px;
    font-size:11px; font-weight:800; letter-spacing:0.8px; text-align:center;
    background:rgba(245,179,66,0.1); border:1px solid rgba(245,179,66,0.4);
    color:#f5b342;
  }
  .fibo-near {
    width:100%; margin-top:5px; padding:5px 8px; border-radius:3px;
    font-size:10px; font-weight:600; text-align:center;
    background:rgba(245,179,66,0.05); border:1px solid rgba(245,179,66,0.15);
    color:#f5b342;
  }
  .fibo-levels {
    font-size:8px; font-weight:400; opacity:0.8; margin-top:2px; letter-spacing:0;
  }
  @keyframes fiboPulse {
    0%,100%{box-shadow:0 0 6px rgba(245,179,66,0.1);}
    50%{box-shadow:0 0 16px rgba(245,179,66,0.35);}
  }
  /* ── KARAR KUTUSU ── */
  @keyframes newBoxPulse {
    0%   { transform: scale(1);    box-shadow: 0 0 0px transparent; }
    40%  { transform: scale(1.04); box-shadow: 0 0 12px currentColor; }
    100% { transform: scale(1);    box-shadow: 0 0 0px transparent; }
  }
  .karar-box.new-box {
    animation: newBoxPulse 0.8s ease 3;
    font-size: 10px !important;
  }
  .karar-box {
    width: 100%; margin-top: 6px;
    padding: 7px 8px; border-radius: 3px;
    font-size: 12px; font-weight: 800;
    letter-spacing: 1.2px; text-align: center;
    cursor: default; border: 1px solid transparent;
  }
  .karar-long       { background: rgba(34,197,94,0.15);  border-color: rgba(34,197,94,0.5);  color: #22c55e; }
  .karar-short      { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5); color: #ef4444; }
  .karar-bekle-long { background: rgba(34,197,94,0.05);  border-color: rgba(34,197,94,0.2);  color: #22c55e; }
  .karar-bekle-short{ background: rgba(239,68,68,0.05); border-color: rgba(239,68,68,0.2); color: #ef4444; }
  .karar-neutral    { background: rgba(245,179,66,0.07); border-color: rgba(245,179,66,0.2); color: #f5b342; }
  .karar-atla       { background: rgba(31,39,64,0.07); border-color: rgba(31,39,64,0.2); color: #556; }

  /* ── CHART MODAL ── */
  .chart-btn {
    width: 100%;
    margin-top: 6px;
    background: rgba(45,212,191,0.08);
    border: 1px solid rgba(45,212,191,0.25);
    color: var(--blue);
    font-size: 9px; font-family: inherit; font-weight: 700;
    padding: 5px 0; border-radius: 2px;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.15s;
  }
  .chart-btn:hover { background: rgba(45,212,191,0.18); border-color: var(--blue); }

  .ctf-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 9px; font-family: inherit;
    padding: 3px 8px; border-radius: 2px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .ctf-btn:hover { border-color: var(--blue); color: var(--blue); }
  .ctf-btn.active { background: rgba(45,212,191,0.15); border-color: var(--blue); color: var(--blue); font-weight: 700; }

  /* ── ORDER BOOK MODAL ── */
  .ob-modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .ob-modal {
    background: #0a0e1a;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: min(500px, 96vw);
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .ob-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #0a0e1a; z-index: 1;
  }
  .ob-title { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: white; }
  .ob-close {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    width: 28px; height: 28px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .ob-close:hover { color: var(--red); border-color: var(--red); }

  .ob-body { padding: 14px 16px; }

  /* Baskı göstergesi */
  .pressure-bar-wrap {
    height: 20px; border-radius: 2px; overflow: hidden;
    display: flex; margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .pressure-buy  { background: linear-gradient(90deg, rgba(34,197,94,0.7), rgba(34,197,94,0.4)); transition: width 0.5s; }
  .pressure-sell { background: linear-gradient(90deg, rgba(239,68,68,0.4), rgba(239,68,68,0.7));  transition: width 0.5s; }
  .pressure-labels { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 12px; }
  .pressure-labels span:first-child { color: var(--green); }
  .pressure-labels span:last-child  { color: var(--red); }

  .pressure-verdict {
    text-align: center; font-size: 13px; font-weight: 700;
    letter-spacing: 1px; padding: 8px; border-radius: 3px;
    margin-bottom: 14px;
  }
  .pressure-verdict.strong-buy  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .pressure-verdict.weak-buy    { background: rgba(34,197,94,0.07); color: #e8edf5;      border: 1px solid rgba(34,197,94,0.15); }
  .pressure-verdict.neutral-p   { background: rgba(245,179,66,0.07);  color: var(--yellow);border: 1px solid rgba(245,179,66,0.2); }
  .pressure-verdict.weak-sell   { background: rgba(239,68,68,0.07);  color: #e8edf5;     border: 1px solid rgba(239,68,68,0.15); }
  .pressure-verdict.strong-sell { background: rgba(239,68,68,0.15);  color: var(--red);  border: 1px solid rgba(239,68,68,0.3); }

  /* Order book tablo */
  .ob-section-title {
    font-size: 9px; color: var(--text-dim); letter-spacing: 1px;
    margin-bottom: 6px; margin-top: 12px;
  }
  .ob-table { width: 100%; border-collapse: collapse; }
  .ob-table th {
    font-size: 8px; color: var(--text-dim); letter-spacing: 0.5px;
    padding: 3px 6px; text-align: right; border-bottom: 1px solid var(--border);
  }
  .ob-table th:first-child { text-align: left; }
  .ob-table td { font-size: 10px; padding: 4px 6px; text-align: right; position: relative; }
  .ob-table td:first-child { text-align: left; font-weight: 700; }

  .ob-row-ask td:first-child { color: var(--red); }
  .ob-row-bid td:first-child { color: var(--green); }

  .ob-bar-bg {
    position: absolute; top: 0; right: 0; bottom: 0;
    opacity: 0.12; border-radius: 1px;
  }
  .ob-bar-bg.ask { background: var(--red); }
  .ob-bar-bg.bid { background: var(--green); }

  /* Son işlemler */
  .trade-row {
    display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 9px;
  }
  .trade-row.buy  .trade-side { color: var(--green); }
  .trade-row.sell .trade-side { color: var(--red); }
  .trade-price { color: var(--text); font-weight: 500; }
  .trade-qty   { color: var(--text-dim); }
  .trade-time  { color: var(--text-dim); min-width: 42px; text-align: right; }
  .trade-big   { font-weight: 700; }

  .ob-loading {
    text-align: center; padding: 30px;
    color: var(--text-dim); font-size: 10px; letter-spacing: 2px;
    animation: pulse 1.5s infinite;
  }

  .ob-detail-row {
    display: flex; justify-content: space-between;
    font-size: 9px; padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .ob-detail-row span:first-child { color: var(--text-dim); }
  .ob-detail-row span:last-child  { color: var(--text); font-weight: 500; }

  .ob-open-btn {
    width: 100%; margin-top: 8px;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 8px; padding: 4px; cursor: pointer;
    letter-spacing: 1px; border-radius: 2px; transition: all 0.15s;
  }
  .ob-open-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── WOLF AI SKOR BADGE ── */
  .wolf-score-badge {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 7px; padding: 6px 8px;
    border-radius: 3px; cursor: pointer;
    transition: all 0.2s; border: 1px solid transparent;
    position: relative; overflow: hidden;
  }
  .wolf-score-badge:hover { filter: brightness(1.2); }
  .wolf-score-badge.score-strong-buy  { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); }
  .wolf-score-badge.score-buy         { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.2);  }
  .wolf-score-badge.score-neutral     { background: rgba(245,179,66,0.06);  border-color: rgba(245,179,66,0.2);  }
  .wolf-score-badge.score-sell        { background: rgba(239,68,68,0.06);  border-color: rgba(239,68,68,0.2);  }
  .wolf-score-badge.score-strong-sell { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .wolf-score-badge.score-loading     { background: rgba(255,255,255,0.03); border-color: var(--border); }

  .wolf-score-badge.score-strong-buy  { animation: scorePulseGreen 2s infinite; }
  .wolf-score-badge.score-strong-sell { animation: scorePulseRed 2s infinite; }

  @keyframes scorePulseGreen {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    50%      { box-shadow: 0 0 8px 2px rgba(34,197,94,0.3); }
  }
  @keyframes scorePulseRed {
    0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    50%      { box-shadow: 0 0 8px 2px rgba(239,68,68,0.3); }
  }

  .wsb-left { display: flex; flex-direction: column; gap: 2px; }
  .wsb-label { font-size: 8px; color: var(--text-dim); letter-spacing: 0.5px; }
  .wsb-verdict { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .wsb-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .wsb-score { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; line-height: 1; }
  .wsb-bar-wrap { width: 50px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .wsb-bar { height: 100%; border-radius: 2px; transition: width 0.5s; }

  .wsb-loading { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; animation: pulse 1.5s infinite; width: 100%; text-align: center; }

  /* ── UYARI BADGE ── */
  .warn-badge {
    display: flex; align-items: center; gap: 4px;
    background: rgba(245,179,66,0.12);
    border: 1px solid rgba(245,179,66,0.4);
    border-radius: 2px;
    padding: 3px 6px;
    font-size: 9px; font-weight: 700;
    color: #f5b342; letter-spacing: 0.5px;
    margin-bottom: 5px;
    animation: warnPulse 2s infinite;
  }
  @keyframes warnPulse {
    0%,100% { border-color: rgba(245,179,66,0.4); }
    50%      { border-color: rgba(245,179,66,0.9); }
  }

  /* ── PORTFOLIO BAR ── */
  .portfolio-bar {
    position: sticky; top: 0; z-index: 49;
    padding: 8px 24px;
    background: rgba(10,14,26,0.97);
    border-bottom: 1px solid var(--border);
    display: none;
    gap: 20px; flex-wrap: wrap; align-items: center;
  }
  .portfolio-bar.visible { display: flex; }
  .pb-item { font-size: 10px; letter-spacing: 0.5px; }
  .pb-val { font-weight: 700; }
  .pb-val.g { color: var(--green); }
  .pb-val.r { color: var(--red); }
  .pb-clear {
    margin-left: auto;
    background: none; border: 1px solid rgba(239,68,68,0.3);
    color: var(--red); font-family: 'JetBrains Mono', monospace;
    font-size: 9px; padding: 3px 10px; cursor: pointer;
    border-radius: 2px; letter-spacing: 1px;
  }
  .pb-clear:hover { background: rgba(239,68,68,0.1); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .controls { padding: 10px 12px; }
    .grid-container { padding: 12px; }
    .header { padding: 12px; }
  }
</style>

// ─────────────────────────────────────────────
// PEARSON CORRELATION (Pine Script mantığı)
// corr(close, bar_index, length)
// ─────────────────────────────────────────────
function pearsonCorr(y, length) {
  if (y.length < length) return 0;
  const slice = y.slice(y.length - length);
  const x = Array.from({length}, (_, i) => i);
  const n = length;
  const mx = (n - 1) / 2;
  const my = slice.reduce((a, b) => a + b, 0) / n;
  let num = 0, dx2 = 0, dy2 = 0;
  for (let i = 0; i < n; i++) {
    const xi = x[i] - mx, yi = slice[i] - my;
    num += xi * yi;
    dx2 += xi * xi;
    dy2 += yi * yi;
  }
  const denom = Math.sqrt(dx2 * dy2);
  return denom === 0 ? 0 : num / denom;
}

// TI hesapla: (corr + 1) / 2 * 100
function calcTI(closes, length) {
  const corr = pearsonCorr(closes, length);
  return (corr + 1.0) / 2.0 * 100.0;
}

function playAlert(type) {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const soundType = getAlertType();

    if (soundType === 'beep') {
      // Bip — basit iki nota
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(type==='long'?440:660, ctx.currentTime);
      osc.frequency.setValueAtTime(type==='long'?660:330, ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.5);

    } else if (soundType === 'chime') {
      // Zil — 3 nota arpej
      const freqs = type==='long' ? [523,659,784] : [784,659,523];
      freqs.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime+i*0.12);
        gain.gain.setValueAtTime(0, ctx.currentTime+i*0.12);
        gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime+i*0.12+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.12+0.4);
        osc.start(ctx.currentTime+i*0.12);
        osc.stop(ctx.currentTime+i*0.12+0.4);
      });

    } else if (soundType === 'ping') {
      // Ping — kısa metalik ses
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(type==='long'?1200:800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(type==='long'?600:1600, ctx.currentTime+0.3);
      gain.gain.setValueAtTime(0.35, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.3);

    } else if (soundType === 'alarm') {
      // Alarm — tekrarlı bip
      const count = 3;
      for (let i=0; i<count; i++) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(type==='long'?880:440, ctx.currentTime+i*0.2);
        gain.gain.setValueAtTime(0.15, ctx.currentTime+i*0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.2+0.15);
        osc.start(ctx.currentTime+i*0.2);
        osc.stop(ctx.currentTime+i*0.2+0.15);
      }
    }
  } catch(e) {}
}

function checkNewSignals(newData) {
  const isFirst = Object.keys(prevSignals).length === 0;
  if (isFirst) {
    newData.forEach(c => {
      prevSignals[c.symbol] = c.signal;
      prevTiState[c.symbol] = c.signal;
      // İlk taramada setup'ları kaydet
      prevSetup[c.symbol] = !!(c.fibo && c.fibo.inGolden &&
        c.fibo.signalMatch && c.fibo.signalMatch(c.signal) &&
        (c.signal==='long'||c.signal==='short'));
    });
    return;
  }
  let newLong = 0, newShort = 0;
  newData.forEach(c => {
    const prev     = prevSignals[c.symbol];
    const prevTi   = prevTiState[c.symbol];
    const currTi   = c.signal;

    // Sinyal değişimi (ses)
    if (prev !== c.signal) {
      if (c.signal === 'long')  newLong++;
      if (c.signal === 'short') newShort++;
    }
    prevSignals[c.symbol] = c.signal;

    // Setup alarmı — yeni GİRİŞ setup oluştu mu?
    const isSetup = !!(c.fibo && c.fibo.inGolden);
    if (isSetup && !prevSetup[c.symbol]) {
      // Yeni setup — özel ses + konsol
      console.log('🎯 YENİ GİRİŞ SETUP:', c.symbol, c.signal.toUpperCase(), '— Golden Zone');
      setTimeout(() => playAlert(c.signal), 200);
    }
    prevSetup[c.symbol] = isSetup;

    // Kutu geçiş tespiti — nötrden long/short'a geçtiyse
    if (prevTi !== currTi && (currTi === 'long' || currTi === 'short')) {
      c.newBox = true; // karar kutusuna geçirilecek
    }
    prevTiState[c.symbol] = currTi;
  });
  if (newLong > 0)  playAlert('long');
  if (newShort > 0) setTimeout(() => playAlert('short'), newLong > 0 ? 600 : 0);
}

async function fetchTopPerps() {
  const host = await findWorkingHost();
  const [resp, infoResp] = await Promise.all([
    fetch(`${host}/fapi/v1/ticker/24hr`, { signal: AbortSignal.timeout(10000) }),
    fetch(`${host}/fapi/v1/exchangeInfo`, { signal: AbortSignal.timeout(10000) })
  ]);
  if (!resp.ok) throw new Error('24hr ticker hatası: ' + resp.status);
  if (!infoResp.ok) throw new Error('exchangeInfo hatası: ' + infoResp.status);
  const data = await resp.json();
  const info = await infoResp.json();
  // Temiz evren: sadece aktif PERPETUAL USDT kontratları
  const validPerp = new Set(
    (info.symbols || [])
      .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
      .map(s => s.symbol)
  );
  // BTCDOMUSDT / DEFIUSDT = endeks ürünleri (gerçek coin değil) → bilerek hariç
  const exclude = ['BTCDOMUSDT','DEFIUSDT','BLUEBIRDUSDT','BTCSTUSDT'];
  const allCoins = data
    .filter(d => validPerp.has(d.symbol) && !exclude.includes(d.symbol))
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));

  // %10+ 24h hareket yapanları filtrele (tik kutusu ile aç/kapa)
  const filtered = filter10pct
    ? allCoins.filter(d => Math.abs(parseFloat(d.priceChangePercent)) < 10)
    : allCoins;

  // Limit uygula (0 = tümü)
  const limited = coinLimit > 0 ? filtered.slice(0, coinLimit) : filtered;

  return limited.map((d, i) => ({
    symbol: d.symbol,
    price: parseFloat(d.lastPrice),
    change24h: parseFloat(d.priceChangePercent),
    volume: parseFloat(d.quoteVolume),
    rank: i + 1,
    warned: false,
    warnMsg: ''
  }));
}

// ─────────────────────────────────────────────
// 🐺 WOLF OB ORACLE — JS PORT (1H / 4H / Günlük Order Block)
// Pine mantığı: swing tabanlı OB tespiti + breaker (kırılma) geçersizleştirme
// klinesRaw: Binance kline dizisi [openTime,o,h,l,c,v,closeTime,quoteVol,...]
// Zone İptal = "Close" (senin ayarın), Swing Length = OB_SWING_LEN
// Hacim = base hacim (Pine 'volume' ile aynı) → chart etiketleriyle birebir eşleşir
// ─────────────────────────────────────────────
function detectOBs(klinesRaw, swingLen) {
  const empty = { bull: [], bear: [] };
  if (!klinesRaw || klinesRaw.length < swingLen + 6) return empty;
  // Son (oluşmakta olan) mumu dışla — sadece kapanmış mumlarla çalış
  const kl = klinesRaw.slice(0, -1);
  const n = kl.length;
  if (n < swingLen + 5) return empty;

  const o = [], h = [], l = [], c = [], qv = [], quv = [];
  for (let i = 0; i < n; i++) {
    o.push(parseFloat(kl[i][1]));
    h.push(parseFloat(kl[i][2]));
    l.push(parseFloat(kl[i][3]));
    c.push(parseFloat(kl[i][4]));
    qv.push(parseFloat(kl[i][5]) || 0);  // base hacim (adet — Pine 'volume', chart ile aynı)
    quv.push(parseFloat(kl[i][7]) || 0); // quote hacim (USDT ≈ dolar)
  }

  // ATR(10)
  const atr = new Array(n).fill(0);
  const trArr = [];
  let trSum = 0;
  for (let i = 0; i < n; i++) {
    const tr = i === 0 ? (h[i] - l[i])
      : Math.max(h[i] - l[i], Math.abs(h[i] - c[i-1]), Math.abs(l[i] - c[i-1]));
    trArr.push(tr);
    if (i < 10) { trSum += tr; atr[i] = trSum / (i + 1); }
    else { trSum += tr - trArr[i-10]; atr[i] = trSum / 10; }
  }
  const maxATRmult = 3.5;

  let bull = [], bear = [];
  let os = 0;
  let topX = null, topY = null, topCrossed = false;
  let btmX = null, btmY = null, btmCrossed = false;

  for (let i = swingLen; i < n; i++) {
    // son swingLen barın en yükseği/en düşüğü
    let hh = -Infinity, ll = Infinity;
    for (let k = i - swingLen + 1; k <= i; k++) { if (h[k] > hh) hh = h[k]; if (l[k] < ll) ll = l[k]; }
    const osPrev = os;
    const hb = h[i - swingLen], lb = l[i - swingLen];
    os = hb > hh ? 0 : lb < ll ? 1 : os;
    if (os === 0 && osPrev !== 0) { topX = i - swingLen; topY = hb; topCrossed = false; }
    if (os === 1 && osPrev !== 1) { btmX = i - swingLen; btmY = lb; btmCrossed = false; }

    // --- Bull OB geçersizleştirme (Close yöntemi) ---
    for (let bi = bull.length - 1; bi >= 0; bi--) {
      const ob = bull[bi];
      if (!ob.breaker) { if (Math.min(o[i], c[i]) < ob.bottom) ob.breaker = true; }
      else { if (h[i] > ob.top) bull.splice(bi, 1); }
    }
    // --- Yeni Bull OB ---
    if (topY !== null && c[i] > topY && !topCrossed) {
      topCrossed = true;
      let bBtm = Math.min(o[i-1], c[i-1]);
      let bTop = Math.max(o[i-1], c[i-1]);
      const lim = Math.max(1, i - topX - 1);
      for (let j = 1; j <= lim; j++) {
        const idx = i - j; if (idx < 0) break;
        if (Math.min(o[idx], c[idx]) < bBtm) { bBtm = Math.min(o[idx], c[idx]); bTop = Math.max(o[idx], c[idx]); }
      }
      if (Math.abs(bTop - bBtm) <= atr[i] * maxATRmult) {
        bull.unshift({ type:'bull', top:bTop, bottom:bBtm, qVol:qv[i], usd:quv[i], startIdx:i, breaker:false });
        if (bull.length > 30) bull.pop();
      }
    }

    // --- Bear OB geçersizleştirme ---
    for (let bi = bear.length - 1; bi >= 0; bi--) {
      const ob = bear[bi];
      if (!ob.breaker) { if (Math.max(o[i], c[i]) > ob.top) ob.breaker = true; }
      else { if (l[i] < ob.bottom) bear.splice(bi, 1); }
    }
    // --- Yeni Bear OB ---
    if (btmY !== null && c[i] < btmY && !btmCrossed) {
      btmCrossed = true;
      let bTop = Math.max(o[i-1], c[i-1]);
      let bBtm = Math.min(o[i-1], c[i-1]);
      const lim = Math.max(1, i - btmX - 1);
      for (let j = 1; j <= lim; j++) {
        const idx = i - j; if (idx < 0) break;
        if (Math.max(o[idx], c[idx]) > bTop) { bTop = Math.max(o[idx], c[idx]); bBtm = Math.min(o[idx], c[idx]); }
      }
      if (Math.abs(bTop - bBtm) <= atr[i] * maxATRmult) {
        bear.unshift({ type:'bear', top:bTop, bottom:bBtm, qVol:qv[i], usd:quv[i], startIdx:i, breaker:false });
        if (bear.length > 30) bear.pop();
      }
    }
  }
  // sadece aktif (kırılmamış) OB'leri döndür
  return {
    bull: bull.filter(ob => !ob.breaker),
    bear: bear.filter(ob => !ob.breaker)
  };
}

// Kart için: her TF'te fiyata en yakın aktif OB + RETEST (fiyat OB içinde mi?)
function analyzeOBMTF(obSets, price) {
  const out = { _retest: false };
  for (const tf of ['1h','4h','1d']) {
    const s = obSets[tf];
    if (!s) { out[tf] = null; continue; }
    const all = [...s.bull, ...s.bear];
    if (all.length === 0) { out[tf] = null; continue; }

    // Fiyat herhangi bir aktif OB içinde mi? → RETEST
    let inside = null;
    for (const ob of all) { if (price >= ob.bottom && price <= ob.top) { inside = ob; break; } }

    let chosen, status, distPct;
    if (inside) {
      chosen = inside; status = 'retest'; distPct = 0; out._retest = true;
    } else {
      let best = null, bestDist = Infinity;
      for (const ob of all) {
        const d = price < ob.bottom ? (ob.bottom - price) : (price - ob.top);
        if (d < bestDist) { bestDist = d; best = ob; }
      }
      chosen = best;
      distPct = Math.round((bestDist / price) * 1000) / 10;
      status = price < chosen.bottom ? 'above' : 'below'; // OB fiyatın üstünde / altında
    }
    out[tf] = { type:chosen.type, top:chosen.top, bottom:chosen.bottom, qVol:chosen.qVol, usd:chosen.usd, status, distPct };
  }
  return out;
}

// OB MTF blok iç HTML — hem kart render hem canlı fiyat tazelemede kullanılır
// TradingView format.volume biçimi: 3.25M / 641.752K / 1.573M (sondaki sıfırlar kırpılır)
function fmtPineVol(v) {
  if (!isFinite(v)) return '0';
  let div, suf;
  if (v >= 1e9)      { div = 1e9; suf = 'B'; }
  else if (v >= 1e6) { div = 1e6; suf = 'M'; }
  else if (v >= 1e3) { div = 1e3; suf = 'K'; }
  else return String(Math.round(v));
  let s = (v / div).toFixed(3).replace(/\.?0+$/, '');
  return s + suf;
}
function obBlockInner(obMTF) {
  if (!obMTF) return '';
  const tfLabels = { '1h':'1S', '4h':'4S', '1d':'1G' };
  let rows = '';
  for (const tf of ['1h','4h','1d']) {
    const ob = obMTF[tf];
    if (!ob) { rows += `<div class="ob-row"><span class="ob-tf">${tfLabels[tf]}</span><span class="ob-empty">— OB yok —</span></div>`; continue; }
    const isBull  = ob.type === 'bull';
    const sideTxt = isBull ? '🟢 ALIM' : '🔴 SATIM';
    const sideCls = isBull ? 'ob-bull' : 'ob-bear';
    const volTxt  = `${fmtPineVol(ob.qVol)}<span class="ob-usd">~$${formatVol(ob.usd)}</span>`;
    let statTxt, statCls = '';
    if (ob.status === 'retest')      { statTxt = '● RETEST'; statCls = 'ob-retest'; }
    else if (ob.status === 'above')  { statTxt = '%' + ob.distPct + ' ↑'; }
    else                             { statTxt = '%' + ob.distPct + ' ↓'; }
    rows += `<div class="ob-row"><span class="ob-tf">${tfLabels[tf]}</span><span class="ob-side ${sideCls}">${sideTxt}</span><span class="ob-vol">${volTxt}</span><span class="ob-stat ${statCls}">${statTxt}</span></div>`;
  }
  const hdrCls = obMTF._retest ? 'ob-head ob-head-hot' : 'ob-head';
  return `<div class="${hdrCls}">🐺 OB ORACLE · MTF</div>${rows}`;
}

// Fiyat satırı iç HTML (fiyat + 24s değişim + funding)
function priceLineInner(c) {
  const priceStr = formatPrice(c.price);
  const chg = c.change24h >= 0 ? `+${c.change24h.toFixed(2)}%` : `${c.change24h.toFixed(2)}%`;

// ─────────────────────────────────────────────
// f_dir mantığı (Pine kodundan)
// ─────────────────────────────────────────────
function fDir(ti, upper, lower) {
  if (ti >= upper) return -1;  // SHORT
  if (ti <= lower) return 1;   // LONG
  return 0; // Nötr
}


// ─────────────────────────────────────────────
// 4H FİBO — Swing High/Low tespiti + zone kontrolü
// Mantık: Son N bar içinde en yüksek tepe (swH) ve en düşük dip (swL) bul
// Düşüş hareketi (swH → swL): retracement yukarı → golden zone long
// Yükseliş hareketi (swL → swH): retracement aşağı → golden zone short
// Extension seviyeleri: 1.272, 1.414, 1.618, 1.876
// ─────────────────────────────────────────────
function calc4hFibo(klines4hRaw, currentPrice) {
  // === Wolf All-in-One (FibOB//DD) ile BIREBIR: SuperTrend MTF zigzag + ATR min-dalga ===
  // Pine: timeframe_secimi='' (grafik TF=4H), fibo_modu='Kisa Vade', st_uzunluk=10,
  //       st_oto_mod=true, alt_limit=2.2, ust=6.0, adx_low=20, adx_high=25, fibo_atr_filtre=2.0
  if (!klines4hRaw || klines4hRaw.length < 60) return null;

  const o = [], h = [], l = [], c = [];
  for (const k of klines4hRaw) {
    o.push(parseFloat(k[1])); h.push(parseFloat(k[2]));
    l.push(parseFloat(k[3])); c.push(parseFloat(k[4]));
  }
  const n = c.length;

  // --- Wilder RMA (ta.rma) — NaN warmup atlar, len kadar deger birikince SMA ile tohumlar ---
  const rmaFrom = (src, len) => {
    const out = new Array(src.length).fill(NaN);
    let prev = NaN, cnt = 0, sum = 0, seeded = false;
    for (let i = 0; i < src.length; i++) {
      const v = src[i];
      if (v === null || v === undefined || isNaN(v)) continue;
      if (!seeded) {
        sum += v; cnt++;
        if (cnt === len) { prev = sum / len; out[i] = prev; seeded = true; }
      } else { prev = (prev * (len - 1) + v) / len; out[i] = prev; }
    }
    return out;
  };

  // --- True Range (ta.tr) ---
  const tr = new Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    tr[i] = i === 0 ? (h[i] - l[i])
      : Math.max(h[i] - l[i], Math.abs(h[i] - c[i-1]), Math.abs(l[i] - c[i-1]));
  }
  const atr10 = rmaFrom(tr, 10);
  const atr50 = rmaFrom(tr, 50);
  const atr14 = rmaFrom(tr, 14);

  // --- DMI/ADX (14,14) (ta.dmi) ---
  const plusDM = new Array(n).fill(0), minusDM = new Array(n).fill(0);
  for (let i = 1; i < n; i++) {
    const up = h[i] - h[i-1];
    const dn = l[i-1] - l[i];
    plusDM[i]  = (up > dn && up > 0) ? up : 0;
    minusDM[i] = (dn > up && dn > 0) ? dn : 0;
  }
  const trur14  = rmaFrom(tr, 14);
  const plusR   = rmaFrom(plusDM, 14);
  const minusR  = rmaFrom(minusDM, 14);
  const dx = new Array(n).fill(NaN);
  for (let i = 0; i < n; i++) {
    if (isNaN(trur14[i]) || trur14[i] === 0) continue;
    const plus  = 100 * plusR[i]  / trur14[i];
    const minus = 100 * minusR[i] / trur14[i];
    const sum = plus + minus;
    dx[i] = 100 * Math.abs(plus - minus) / (sum === 0 ? 1 : sum);
  }
  const adxArr = rmaFrom(dx, 14);

  // --- Adaptif carpan (calc_data icindeki mantik) ---
  const factorArr = new Array(n).fill(3.0);
  for (let i = 0; i < n; i++) {
    const ak = atr10[i], au = atr50[i];
    const vol = (isFinite(au) && au > 0 && isFinite(ak) && ak > 0) ? (ak / au) : 1.0;
    let f = 3.0 / vol;
    const adx = adxArr[i];
    if (isFinite(adx)) {
      if (adx < 20) f *= 1.3;
      else if (adx > 25) f *= 0.85;
    }
    f = Math.max(2.2, Math.min(6.0, f)); // st_oto_mod=true
    factorArr[i] = f;
  }

  // --- SuperTrend (ta.supertrend, atr=atr10) ---
  const dir = new Array(n).fill(0);
  let prevUp = NaN, prevLo = NaN, prevST = NaN;
  for (let i = 0; i < n; i++) {
    const a = atr10[i];
    const mid = (h[i] + l[i]) / 2;
    let up = mid + factorArr[i] * a;
    let lo = mid - factorArr[i] * a;
    if (!isFinite(a)) { dir[i] = 1; prevUp = up; prevLo = lo; prevST = up; continue; }
    const pLo = isFinite(prevLo) ? prevLo : lo;
    const pUp = isFinite(prevUp) ? prevUp : up;
    lo = (lo > pLo || c[i-1] < pLo) ? lo : pLo;
    up = (up < pUp || c[i-1] > pUp) ? up : pUp;
    let d;
    if (!isFinite(atr10[i-1])) d = 1;
    else if (prevST === pUp) d = c[i] > up ? -1 : 1;
    else d = c[i] < lo ? 1 : -1;
    const st = d === -1 ? lo : up;
    dir[i] = d; prevUp = up; prevLo = lo; prevST = st;
  }

  // --- Zigzag (SuperTrend yon donusunde pivot; index 0 = en yeni) ---
  const zzP = [], zzT = [];
  let prevTrend = null;
  for (let i = 0; i < n; i++) {
    const trend = dir[i] === -1 ? 1 : -1;
    const changed = prevTrend !== null && trend !== prevTrend;
    if (changed) {
      zzP.unshift(trend === 1 ? h[i] : l[i]);
      zzT.unshift(i);
    } else if (zzP.length > 0) {
      if (trend === 1 && h[i] > zzP[0]) { zzP[0] = h[i]; zzT[0] = i; }
      else if (trend === -1 && l[i] < zzP[0]) { zzP[0] = l[i]; zzT[0] = i; }
    }
    prevTrend = trend;
    if (zzP.length > 50) { zzP.pop(); zzT.pop(); }
  }

  if (zzP.length < 3) return null;

  // --- Capa secimi (idx0=1 son onayli pivot, idx1 ATR min-dalga ile geri itilir) ---
  const aktifAtr = atr14[n-1];
  const minDalga = (isFinite(aktifAtr) ? aktifAtr : 0) * 2.0;
  let idx0 = 1, idx1 = 2;
  if (zzP.length > 3) {
    const p0 = zzP[idx0];
    for (let i = 2; i < zzP.length; i++) {
      if (Math.abs(zzP[i] - p0) >= minDalga) { idx1 = i; break; }
    }
  }
  const anchor0 = zzP[idx0];
  const anchor1 = zzP[idx1];
  const diff = anchor1 - anchor0;
  if (diff === 0) return null;

  // fib 0 = anchor0 (en guncel pivot), fib 1.0 = anchor1 (eski pivot)
  const lvlPrice = (L) => anchor0 + diff * L;

  const swH = Math.max(anchor0, anchor1);
  const swL = Math.min(anchor0, anchor1);

  const fp = (v) => v < 0.01 ? v.toFixed(6) : v < 1 ? v.toFixed(5) : v.toFixed(3);

  const ratios = [0, 0.114, 0.236, 0.382, 0.5, 0.618, 0.786, 0.889, 1, 1.272, 1.414, 1.618, 1.876];
  const levels = ratios.map(L => ({ r: (L === 0.5 ? '0.5' : String(L)), v: lvlPrice(L) }));

  // Fiyat hangi iki seviye arasinda?
  let currentLevel = null, pct = null;
  for (let i = 0; i < levels.length - 1; i++) {
    const hi = Math.max(levels[i].v, levels[i+1].v);
    const lo = Math.min(levels[i].v, levels[i+1].v);
    if (currentPrice >= lo && currentPrice <= hi) {
      const dA = Math.abs(currentPrice - levels[i].v);
      const dB = Math.abs(currentPrice - levels[i+1].v);
      currentLevel = dA < dB ? levels[i] : levels[i+1];
      pct = ((hi - lo) > 0) ? ((Math.abs(currentPrice - currentLevel.v) / (hi - lo)) * 100).toFixed(0) : '0';
      break;
    }
  }
  if (!currentLevel) {
    let md = Infinity;
    for (const lv of levels) { const d = Math.abs(currentPrice - lv.v); if (d < md) { md = d; currentLevel = lv; } }
    pct = (md / currentPrice * 100).toFixed(1);
  }

  // OTE giris bolgesi (0.786 - 0.889) — Wolf All-in-One ile ayni
  const ote786 = lvlPrice(0.786);
  const ote889 = lvlPrice(0.889);
  const gzMin = Math.min(ote786, ote889);
  const gzMax = Math.max(ote786, ote889);
  const inGolden = currentPrice >= gzMin && currentPrice <= gzMax;

  // Extension bolgesinde mi?
  const extLevels = ['1.272','1.414','1.618','1.876'];
  let activeExt = null;
  for (const lv of levels.filter(x => extLevels.includes(x.r))) {
    if (Math.abs(currentPrice - lv.v) / currentPrice * 100 < 2.0) { activeExt = lv.r; break; }
  }

  const distToGolden = currentPrice > gzMax
    ? (currentPrice - gzMax) / currentPrice * 100
    : currentPrice < gzMin
    ? (gzMin - currentPrice) / currentPrice * 100
    : 0;
  const nearGolden = !inGolden && distToGolden < 2.0;

  let lvlTag = '';
  if (currentLevel) {
    if (currentLevel.r === '0.618') lvlTag = ' (Golden)';
    else if (currentLevel.r === '0.5') lvlTag = ' (EQ)';
    else if (currentLevel.r === '0.786' || currentLevel.r === '0.889') lvlTag = ' (OTE)';
  }

  return {
    swH: fp(swH), swL: fp(swL),
    currentLevel: (currentLevel ? currentLevel.r : '?') + lvlTag,
    currentLevelPrice: currentLevel ? fp(currentLevel.v) : '?',
    inGolden, activeExt, nearGolden,
    distToGolden: distToGolden.toFixed(1),
    gzMin: fp(gzMin), gzMax: fp(gzMax),
    levels: levels.map(x => ({r:x.r, v:fp(x.v)}))
  };
}

// ─────────────────────────────────────────────
// 4H FVG HESAPLAMA (LuxAlgo mantığı)
// Mitigate olmamış tüm 4H FVG'leri listele
// currentPrice 4H FVG kutusunun içinde mi bak
// ─────────────────────────────────────────────
function calc4hFVG(klines4hRaw, currentPrice) {
  // klines4hRaw: Binance klines formatı [openTime, open, high, low, close, ...]
  // Threshold = 0 (Pine default)
  if (!klines4hRaw || klines4hRaw.length < 10) return { inFVG: false, fvgType: null, fvgMin: null, fvgMax: null };

  const bars = klines4hRaw.map(k => ({
    o: parseFloat(k[1]),
    h: parseFloat(k[2]),
    l: parseFloat(k[3]),
    c: parseFloat(k[4])
  }));

  // Tüm mitigate olmamış FVG'leri bul
  // Pine mantığı: bar[i] için, bar[i-2] ile bar[i] arasındaki boşluk
  const activeFVGs = [];

  for (let i = 2; i < bars.length - 1; i++) { // son kapalı bar dahil, açık bar hariç
    const cur  = bars[i];
    const prev = bars[i - 1]; // bar[1]
    const pp   = bars[i - 2]; // bar[2]

    // Bullish FVG: low[i] > high[i-2] ve close[i-1] > high[i-2]
    const bull_fvg = cur.l > pp.h && prev.c > pp.h;
    // Bearish FVG: high[i] < low[i-2] ve close[i-1] < low[i-2]
    const bear_fvg = cur.h < pp.l && prev.c < pp.l;

    if (bull_fvg) {
      activeFVGs.push({ type: 'bull', min: pp.h, max: cur.l, barIdx: i });
    } else if (bear_fvg) {
      activeFVGs.push({ type: 'bear', min: cur.h, max: pp.l, barIdx: i });
    }
  }

  // Mitigasyon kontrolü: sonraki barlarda fiyat FVG'ye değdiyse iptal et
  const validFVGs = [];
  for (const fvg of activeFVGs) {
    let mitigated = false;
    for (let j = fvg.barIdx + 1; j < bars.length; j++) {
      const b = bars[j];
      if (fvg.type === 'bull' && b.l <= fvg.min) { mitigated = true; break; }
      if (fvg.type === 'bear' && b.h >= fvg.max) { mitigated = true; break; }
    }
    if (!mitigated) validFVGs.push(fvg);
  }

  // Şu anki fiyat herhangi bir geçerli FVG'nin içinde mi?
  for (const fvg of validFVGs) {
    if (currentPrice >= fvg.min && currentPrice <= fvg.max) {
      return { inFVG: true, fvgType: fvg.type, fvgMin: fvg.min, fvgMax: fvg.max };
    }
  }

  // İçinde değilse: en yakın FVG'yi bul (bilgi amaçlı)
  let closest = null, closestDist = Infinity;
  for (const fvg of validFVGs) {
    const mid = (fvg.min + fvg.max) / 2;
    const dist = Math.abs(currentPrice - mid) / currentPrice * 100;
    if (dist < closestDist) { closestDist = dist; closest = fvg; }
  }

  return {
    inFVG: false,
    fvgType: null,
    fvgMin: null,
    fvgMax: null,
    nearFVG: closest ? closest.type : null,
    nearFVGDist: closest ? closestDist.toFixed(2) : null
  };
}

  loadBar.style.width = '0%';
  loadText.textContent = 'TÜM BINANCE PERP VERİLERİ YÜKLENİYOR...';

  const statusDot = document.getElementById('statusDot');
  statusDot.className = 'status-dot';

  const tiLen    = parseInt(document.getElementById('tiLen').value)    || 12;
  const upper    = parseFloat(document.getElementById('upperBand').value) || 88;
  const lower    = parseFloat(document.getElementById('lowerBand').value) || 12;
  const klineNeeded = tiLen + 10; // biraz fazla al

  document.getElementById('errorBox').innerHTML = '';

  try {
    // 1. Tüm perp coinleri al
    loadText.textContent = 'TÜM PERP COİN LİSTESİ ALINIYOR...';
    loadBar.style.width = '5%';
    const tops = await fetchTopPerps();

    for (let i = 0; i < tops.length; i++) {
      const coin = tops[i];
      const prog = 5 + Math.round((i / tops.length) * 90);
      loadBar.style.width = prog + '%';
      loadText.textContent = `[${i+1}/${tops.length}] ${coin.symbol} — 4H & 1H KLINE ÇEKILIYOR...`;
      try {
        const scanHost = await findWorkingHost();
        const [klines15mRaw, klines4hRaw, klines1hOB, klines1dOB, fundingRaw] = await Promise.all([
          fetchKlinesRaw(coin.symbol, '15m', 220),
          fetchKlinesRaw(coin.symbol, '4h', Math.max(250, klineNeeded + 5)),
          fetchKlinesRaw(coin.symbol, '1h', Math.max(300, klineNeeded + 5)),
          fetchKlinesRaw(coin.symbol, '1d', 200),
          fetch(scanHost+'/fapi/v1/premiumIndex?symbol='+coin.symbol, {signal:AbortSignal.timeout(4000)}).then(r=>r.json()).catch(()=>null)
          ]);
          // Tekrar eden 1H/4H cekimleri kaldirildi - ayni veriden turetiliyor (veri birebir ayni)
          const closes4h = klines4hRaw.slice(-(klineNeeded + 5)).map(k => parseFloat(k[4]));
          const closes1h = klines1hOB.slice(-(klineNeeded + 5)).map(k => parseFloat(k[4]));
          const klines1hRaw = klines1hOB.slice(-22);
        const fundingRate = fundingRaw && fundingRaw.lastFundingRate !== undefined ? parseFloat(fundingRaw.lastFundingRate)*100 : null;

        // 🐺 OB ORACLE — 1H / 4H / Günlük order block tespiti + MTF analiz
        const obSets = {
          '1h': detectOBs(klines1hOB, OB_SWING_LEN),
          '4h': detectOBs(klines4hRaw, OB_SWING_LEN),
          '1d': detectOBs(klines1dOB, OB_SWING_LEN)
        };
        const obMTF = analyzeOBMTF(obSets, coin.price);

        // 4H FVG hesapla — mevcut 15dk fiyatı 4H FVG kutusunda mı?
        const fvgResult = calc4hFVG(klines4hRaw, coin.price);

        // 4H FİBO — swing high/low tespiti + golden zone / extension kontrolü
        const fiboResult = calc4hFibo(klines4hRaw, coin.price);

        // TT-Scalper Veins 15dk sinyal (smoothrng + rngfilt)
        let scalperSignal = 'none';
        let ema233Above = null;
        if (klines15mRaw && klines15mRaw.length >= 60) {
          const src = klines15mRaw.map(k => parseFloat(k[4]));
          const emaFn = (arr, len) => {
            const k = 2/(len+1); let e = arr[0];
            return arr.map(v => { e = v*k + e*(1-k); return e; });
          };
          const ema233vals = emaFn(src, 233);
          ema233Above = src[src.length-1] > ema233vals[ema233vals.length-1];
          const smoothrng = (arr, t, m) => {
            const wper = t*2-1;
            const diffs = arr.map((v,i) => i===0 ? 0 : Math.abs(v-arr[i-1]));
            return emaFn(emaFn(diffs, t).map(v => v*m), wper);
          };
          const rngfilt = (arr, rng) => {
            const rf = [arr[0]];
            for (let i=1; i<arr.length; i++) {
              const p=rf[i-1], r=rng[i];
              rf.push(arr[i] > p ? Math.max(p, arr[i]-r) : Math.min(p, arr[i]+r));
            }
            return rf;
          };
          const smrng1 = smoothrng(src, 55, 3.0);
          const smrng2 = smoothrng(src, Math.min(200, src.length-1), 3.0);
          const smrng  = smrng1.map((v,i) => (v+smrng2[i])/2);
          const filt   = rngfilt(src, smrng);
          let lastCond = 0;
          for (let i=1; i<filt.length; i++) {
            const bull = src[i] > filt[i] && filt[i] > filt[i-1];
            const bear = src[i] < filt[i] && filt[i] < filt[i-1];
            if (bull && lastCond===-1 && i >= filt.length-3) scalperSignal = 'buy';
            if (bear && lastCond===1  && i >= filt.length-3) scalperSignal = 'sell';
            if (bull) lastCond=1; else if (bear) lastCond=-1;
          }
        }

        // Hacim Spike — Son 1H mumu, önceki 20 mumun ortalamasının 3x üzerindeyse
        if (klines1hRaw && klines1hRaw.length >= 21) {
          const lastVol = parseFloat(klines1hRaw[klines1hRaw.length-1][5]);
          const prev20  = klines1hRaw.slice(-21, -1).map(k => parseFloat(k[5]));
          const avg20   = prev20.reduce((s,v) => s+v, 0) / prev20.length;
          if (avg20 > 0 && lastVol > avg20 * 3) {
            coin.warned  = true;
            coin.warnMsg = lastVol > avg20 * 5 ? '⚠ GÜÇLÜ HACİM SPİKE 5x+' : '⚠ HACİM SPİKE 3x+';
          }
        }

        const ti4h = calcTI(closes4h, tiLen);
        const ti1h = calcTI(closes1h, tiLen);
        const dir4h = fDir(ti4h, upper, lower);
        const dir1h = fDir(ti1h, upper, lower);

        let signal = 'neutral';
        if (dir4h === 1  && dir1h === 1)  signal = 'long';
        if (dir4h === -1 && dir1h === -1) signal = 'short';

        results.push({
          ...coin,
          ti4h: Math.round(ti4h * 10) / 10,
          ti1h: Math.round(ti1h * 10) / 10,
          dir4h, dir1h, signal,
          scalperSignal, ema233Above,
          warned: coin.warned || false,
          warnMsg: coin.warnMsg || '',
          fundingRate,
          fvgInZone:  fvgResult.inFVG,
          fvgType:    fvgResult.fvgType,
          fvgMin:     fvgResult.fvgMin,
          fvgMax:     fvgResult.fvgMax,
          nearFVG:    fvgResult.nearFVG,
          nearFVGDist: fvgResult.nearFVGDist,
          fibo:       fiboResult,
          obMTF:      obMTF,
          obSets:     obSets
        });
      if (signal !== 'neutral') { renderGrid(); renderStats(); }
      document.getElementById('lastUpdate').textContent = 'TARANIYOR... ' + (i+1) + '/' + tops.length + ' · ' + results.filter(function(r){return r.signal!=='neutral';}).length + ' sinyal';
      } catch(e) {
        // coin atlı, devam
        console.warn('Atlandı:', coin.symbol, e.message);
      }

      // Rate limit için küçük bekleme
      await new Promise(r => setTimeout(r, 45));
    }

    loadBar.style.width = '100%';
    loadText.textContent = 'TAMAMLANDI!';

    coinData = results;
    checkNewSignals(results);
    renderStats();
    renderGrid();
    setTimeout(() => scoreAllCards(), 500);

    statusDot.className = 'status-dot live';
    document.getElementById('lastUpdate').textContent =
      'GÜNCELLEME: ' + new Date().toLocaleTimeString('tr-TR');

    setTimeout(() => { overlay.style.display = 'none'; }, 600);

  } catch(err) {
    overlay.style.display = 'none';
    statusDot.className = 'status-dot error';
    document.getElementById('errorBox').innerHTML =
      `<div class="error-box">⚠ HATA: ${err.message}<br><small>İnternet bağlantınızı kontrol edin ve tekrar deneyin.</small></div>`;
  }

  refreshBtn.disabled = false;
  refreshBtn.textContent = '⟳ TARA';
  startAutoRefresh(); // Scan bitti → geri sayımı sıfırla
  isScanning = false;
}

function renderStats() {
  const long  = coinData.filter(c => c.signal === 'long').length;
  const short = coinData.filter(c => c.signal === 'short').length;
  const neut  = coinData.filter(c => c.signal === 'neutral').length;
  const match = long + short;
  const fvg    = coinData.filter(c => c.fvgInZone).length;
  const golden = coinData.filter(c => c.fibo && c.fibo.inGolden).length;
  const extZone = coinData.filter(c => c.fibo && c.fibo.activeExt).length;

  document.getElementById('statTotal').textContent   = coinData.length;
  document.getElementById('statLong').textContent    = long;
  document.getElementById('statShort').textContent   = short;
  document.getElementById('statNeutral').textContent = neut;
  document.getElementById('statMatch').textContent   = match;
  document.getElementById('statFVG').textContent     = fvg + ' coin';
  document.getElementById('statGolden').textContent  = golden + (extZone ? ' (+'+extZone+' ext)' : '') + ' coin';
  const setup = coinData.filter(c =>
    c.fibo && c.fibo.inGolden
  ).length;
  document.getElementById('statSetup').textContent = setup ? setup + ' coin !' : '—';
  const obRetest = coinData.filter(c => c.obMTF && c.obMTF._retest).length;
  const statOBEl = document.getElementById('statOB');
  if (statOBEl) statOBEl.textContent = obRetest ? obRetest + ' coin' : '—';
}

function renderGrid() {
  const grid = document.getElementById('coinGrid');
  grid.innerHTML = '';

  let filtered = coinData;
  if (activeFilter === 'long')  filtered = coinData.filter(c => c.signal === 'long');
  if (activeFilter === 'short') filtered = coinData.filter(c => c.signal === 'short');
  if (activeFilter === 'fvg')    filtered = coinData.filter(c => c.fvgInZone);
  if (activeFilter === 'golden') filtered = coinData.filter(c => c.fibo && c.fibo.inGolden);
  if (activeFilter === 'obretest') filtered = coinData.filter(c => c.obMTF && c.obMTF._retest);
  // GİRİŞ filtresi: TI sinyal uyumlu + golden zone + yön uyumlu (tam setup)
  if (activeFilter === 'setup')  filtered = coinData.filter(c =>
    c.fibo && c.fibo.inGolden
  );

  // FVG filtresi aktifken: FVG içindekiler önce, sonra sinyal sırası
  if (activeFilter === 'fvg') {
    filtered.sort((a,b) => {
      const order = {'long':0,'short':1,'neutral':2};
      return order[a.signal] - order[b.signal] || b.volume - a.volume;
    });
  }

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🐺</div>
        <div>UYUMLU SİNYAL BULUNAMADI</div>
        <div style="margin-top:8px; font-size:9px">Parametreleri gevşetin veya daha fazla coin tarayın</div>
      </div>`;
    return;
  }

  // Önce long+short, sonra nötr; içinde vol sıralı
  const order = {'long':0,'short':1,'neutral':2};
  filtered.sort((a,b) => order[a.signal] - order[b.signal] || b.volume - a.volume);

  for (const c of filtered) {
    const card = document.createElement('div');
    card.className = 'coin-card ' + c.signal;
    // GİRİŞ SETUP: sinyal + golden zone uyumlu → kart özel border
    if (c.fibo && c.fibo.inGolden && (c.signal === 'long' || c.signal === 'short')) {
      card.style.outline = c.signal === 'long'
        ? '2px solid rgba(245,179,66,0.7)'

      card.style.outlineOffset = '2px';
    }

    const sigLabel = c.signal === 'long' ? '▲ LONG' : c.signal === 'short' ? '▼ SHORT' : '— NÖTR';
    const priceStr = formatPrice(c.price);
    const chg = c.change24h >= 0 ? `+${c.change24h.toFixed(2)}%` : `${c.change24h.toFixed(2)}%`;
    const chgCls = c.change24h >= 0 ? 'pos' : 'neg';
    const vol = formatVol(c.volume);

    // 24h değişime göre kart arka plan yoğunluğu
    const absChg = Math.abs(c.change24h);
    const intensity = Math.min(absChg / 15, 1); // 15%+ = max yoğunluk
    const bgAlpha = (0.03 + intensity * 0.10).toFixed(3);
    const cardBgColor = c.change24h >= 0
      ? `rgba(34,197,94,${bgAlpha})`
      : `rgba(239,68,68,${bgAlpha})`;
    card.style.background = `linear-gradient(135deg, ${cardBgColor}, var(--panel))`;

    const ti4hClass = c.dir4h === 1 ? 'long-zone' : c.dir4h === -1 ? 'short-zone' : 'neutral';
    const ti1hClass = c.dir1h === 1 ? 'long-zone' : c.dir1h === -1 ? 'short-zone' : 'neutral';

    const ti4hColor = c.dir4h === 1 ? 'var(--green)' : c.dir4h === -1 ? 'var(--red)' : 'var(--yellow)';
    const ti1hColor = c.dir1h === 1 ? 'var(--green)' : c.dir1h === -1 ? 'var(--red)' : 'var(--yellow)';

    const base = c.symbol.replace('USDT','');

    // 4H FİBO rozet HTML — sadece bilgi, entry senin kararın

    if (c.fibo) {
      const fb = c.fibo;

      if (fb.inGolden) {

          '</div>';
      } else if (fb.activeExt) {
        const extCols = {'1.272':'#f5b342','1.414':'#f5b342','1.618':'#f5b342','1.876':'#ef4444'};
        const ec = extCols[fb.activeExt] || '#f5b342';

          fb.activeExt + ' EXT ZONE' +

      } else if (fb.nearGolden) {
        fiboHtml = '<div class="fibo-near">📐 ' + fb.currentLevel + ' fibo — OTE\'ye %' + fb.distToGolden + ' uzak</div>';
      } else {
        // Sadece hangi fibo seviyesinde olduğunu yaz
        fiboHtml = '<div class="fibo-near">📐 ' + fb.currentLevel + ' fibo (' + fb.currentLevelPrice + ')</div>';
      }
    }

    // 4H FVG rozet HTML
    let fvgHtml = '';
    if (c.fvgInZone) {
      const fvgLabel = c.fvgType === 'bull' ? '🟢 4H BULL FVG İÇİNDE' : '🔴 4H BEAR FVG İÇİNDE';
      const fvgCls   = c.fvgType === 'bull' ? 'fvg-bull' : 'fvg-bear';
      const fvgRng   = c.fvgMin !== null
        ? `<span class="fvg-range">${formatPrice(c.fvgMin)} – ${formatPrice(c.fvgMax)}</span>`

      fvgHtml = `<div class="fvg-badge ${fvgCls}">${fvgLabel} ${fvgRng}</div>`;
    } else if (c.nearFVG && parseFloat(c.nearFVGDist) < 2.0) {
      const nearLabel = c.nearFVG === 'bull' ? '↑ Bull FVG yakın' : '↓ Bear FVG yakın';
      fvgHtml = `<div class="fvg-badge fvg-near">📍 ${nearLabel} %${c.nearFVGDist}</div>`;
    }

    // 🐺 OB ORACLE · MTF — kart altı 1S / 4S / 1G order block satırları
    let obHtml = '';
    if (c.obMTF) {

    }



    card.innerHTML = `
      <div class="rank-badge">#${c.rank}</div>
      <div class="coin-header">
        <div class="coin-name">${base}</div>
        <div class="coin-signal ${c.signal}">${sigLabel}</div>
      </div>
      <div class="coin-price" id="cp-${c.symbol}">${priceLineInner(c)}</div>
      <div class="volume-chip">VOL: ${vol}</div>
      ${c.warned ? `<div class="warn-badge">⚠ ${c.warnMsg}</div>` : ''}
      <div class="ti-row" style="margin-top:8px">
        <span class="ti-label">4H</span>
        <div class="ti-bar-wrap">
          <div class="ti-bar-fill" style="width:${c.ti4h}%; background:${ti4hColor}; opacity:0.8"></div>
        </div>
        <span class="ti-val ${ti4hClass}">${c.ti4h}</span>
      </div>
      <div class="ti-row" style="margin-top:4px">
        <span class="ti-label">1H</span>
        <div class="ti-bar-wrap">
          <div class="ti-bar-fill" style="width:${c.ti1h}%; background:${ti1hColor}; opacity:0.8"></div>
        </div>
        <span class="ti-val ${ti1hClass}">${c.ti1h}</span>
      </div>
      ${fiboHtml}
      ${fvgHtml}
      ${obHtml}
      <div id="karar-${c.symbol}" class="karar-box karar-neutral">⟳ HESAPLANIYOR...</div>
    `;
    grid.appendChild(card);
  }
}

// OI + Taker + OrderBook + LS Ratio → 0-100
// ─────────────────────────────────────────────
let scoreCache = {};

async function fetchWolfScore(symbol, currentPrice) {
  const cached = scoreCache[symbol];
  if (cached && Date.now() - cached.ts < 180000) return cached.score;
  try {
    const host = await findWorkingHost();
    const [oiResp, oiHistResp, lsResp, takerResp, obResp] = await Promise.all([
      fetch(host+"/fapi/v1/openInterest?symbol="+symbol,                                {signal:AbortSignal.timeout(5000)}),
      fetch(host+"/futures/data/openInterestHist?symbol="+symbol+"&period=1h&limit=6",  {signal:AbortSignal.timeout(5000)}),
      fetch(host+"/futures/data/globalLongShortAccountRatio?symbol="+symbol+"&period=1h&limit=1",{signal:AbortSignal.timeout(5000)}),
      fetch(host+"/futures/data/takerlongshortRatio?symbol="+symbol+"&period=1h&limit=6",{signal:AbortSignal.timeout(5000)}),
      fetch(host+"/fapi/v1/depth?symbol="+symbol+"&limit=10",                           {signal:AbortSignal.timeout(5000)}),
    ]);
    const oi=await oiResp.json(), oiHist=await oiHistResp.json(), ls=await lsResp.json(),
          taker=await takerResp.json(), ob=await obResp.json();

    // ── TI Sinyali — Ana Filtre ──
    // coinData'dan bu coinin TI yönünü al
    const coinInfo = coinData.find(c => c.symbol === symbol);
    const tiDir = coinInfo ? coinInfo.signal : 'neutral'; // 'long','short','neutral'

    // 1. OI Trendi (0-25p)
    let oiScore=12;
    if(oiHist&&oiHist.length>=2){
      const newest=parseFloat(oiHist[oiHist.length-1].sumOpenInterest);
      const oldest=parseFloat(oiHist[0].sumOpenInterest);
      const oiChg=oldest>0?((newest-oldest)/oldest*100):0;
      // LONG sinyalinde OI artışı iyi, SHORT sinyalinde OI artışı da iyi (short squeeze riski düşük değil ama pozisyon girişi)
      if(tiDir==='long')  oiScore=oiChg>3?25:oiChg>1?20:oiChg>0?15:oiChg>-1?8:oiChg>-3?3:0;
      else if(tiDir==='short') oiScore=oiChg<-3?25:oiChg<-1?20:oiChg<0?15:oiChg<1?8:oiChg<3?3:0;
      else oiScore=12; // nötr
    }

    // 2. Taker (0-30p) — LONG için buy taker yüksek olmalı, SHORT için sell taker
    let tb=0,ts=0;
    if(taker&&taker.length>0) taker.forEach(t=>{tb+=parseFloat(t.buyVol);ts+=parseFloat(t.sellVol);});
    const tt=tb+ts, tbp=tt>0?(tb/tt*100):50;
    let takerScore;
    if(tiDir==='long')       takerScore=tbp>70?30:tbp>60?24:tbp>52?18:tbp>48?12:tbp>40?5:0;
    else if(tiDir==='short') takerScore=(100-tbp)>70?30:(100-tbp)>60?24:(100-tbp)>52?18:(100-tbp)>48?12:(100-tbp)>40?5:0;
    else                     takerScore=15; // nötr

    // 3. Long/Short Oranı (0-20p)
    // LONG için: shortlar fazlaysa squeeze potansiyeli yüksek = iyi
    // SHORT için: longlar fazlaysa long squeeze potansiyeli = iyi
    const lsD=ls&&ls[0], lp=lsD?parseFloat(lsD.longAccount)*100:50;
    let lsScore;
    if(tiDir==='long'){
      // Aşırı short = long squeeze beklentisi yüksek = iyi
      lsScore=lp<30?20:lp<40?17:lp<50?14:lp<60?10:lp<70?6:3;
    } else if(tiDir==='short'){
      // Aşırı long = long squeeze riski yüksek = short için iyi
      lsScore=lp>70?20:lp>60?17:lp>50?14:lp>40?10:lp>30?6:3;
    } else {
      lsScore=10;
    }

    // 4. Order Book (0-25p)
    const asks=ob.asks?ob.asks.slice(0,10).map(a=>parseFloat(a[0])*parseFloat(a[1])):[];
    const bids=ob.bids?ob.bids.slice(0,10).map(b=>parseFloat(b[0])*parseFloat(b[1])):[];
    const bv=bids.reduce((s,v)=>s+v,0), av=asks.reduce((s,v)=>s+v,0), ot=bv+av;
    const obp=ot>0?(bv/ot*100):50;
    let obScore;
    if(tiDir==='long')       obScore=obp>65?25:obp>55?20:obp>50?15:obp>45?8:obp>35?3:0;
    else if(tiDir==='short') obScore=(100-obp)>65?25:(100-obp)>55?20:(100-obp)>50?15:(100-obp)>45?8:(100-obp)>35?3:0;
    else                     obScore=12;

    let total=Math.round(oiScore+takerScore+lsScore+obScore);

    // ── TI ANA FİLTRE KISITLAMASI ──
    // TI LONG değilse → skor asla 60+ olamaz (AL sinyali çıkmaz)
    // TI SHORT değilse → skor asla 40- olamaz (ÇIKIŞ sinyali çıkmaz)
    // TI NÖTR ise → skor 35-65 arasında sıkışır
    if(tiDir==='long'){
      // Long sinyalinde skor 30-100 arası — shortun aşağı limitini kaldır
      total=Math.max(30, total);
    } else if(tiDir==='short'){
      // Short sinyalinde skor 0-70 arası — long yüksekliğini kap
      // Skoru tersine çevir: short için yüksek puan = güçlü short
      // Kullanıcıya "ÇIKIŞ/SAT" göstermek için skoru düşük göster
      total=Math.min(40, Math.round(total * 0.5));
    } else {
      // Nötr TI → 35-55 arası
      total=Math.min(55, Math.max(35, total));
    }

    scoreCache[symbol]={score:total,ts:Date.now()};
    return total;
  } catch(e){ return null; }
}

function getScoreInfo(score, symbol){
  if(score===null) return {cls:"score-loading",verdict:"HATA",color:"var(--text-dim)",barColor:"var(--dim)"};
  // TI yönünü al
  const coinInfo = coinData.find(c=>c.symbol===symbol);
  const tiDir = coinInfo ? coinInfo.signal : "neutral";

  if(tiDir==="long"){
    // LONG modunda yüksek skor = güçlü AL
    if(score>=75) return {cls:"score-strong-buy", verdict:"🎯 GÜÇLÜ AL",  color:"var(--green)", barColor:"var(--green)"};
    if(score>=60) return {cls:"score-buy",         verdict:"✅ AL",         color:"#e8edf5",      barColor:"var(--green)"};
    return              {cls:"score-neutral",       verdict:"⏳ BEKLE",      color:"var(--yellow)",barColor:"var(--yellow)"};
  } else if(tiDir==="short"){
    // SHORT modunda düşük skor = güçlü SHORT (TI kısıtlaması ile max 40)
    if(score<=15) return {cls:"score-strong-sell", verdict:"🔴 GÜÇLÜ SHORT", color:"var(--red)",  barColor:"var(--red)"};
    if(score<=28) return {cls:"score-sell",         verdict:"⚠ SHORT",        color:"#e8edf5",     barColor:"var(--red)"};
    return              {cls:"score-neutral",        verdict:"⏳ ZAYIF SHORT", color:"var(--yellow)",barColor:"var(--yellow)"};
  } else {
    // NÖTR
    return {cls:"score-neutral", verdict:"⏳ BEKLE", color:"var(--yellow)", barColor:"var(--yellow)"};
  }
}

function formatPrice(p) {
  if (p >= 1000) return '$' + p.toLocaleString('en-US', {maximumFractionDigits: 1});
  if (p >= 1)    return '$' + p.toLocaleString('en-US', {maximumFractionDigits: 3});
  return '$' + p.toFixed(6);
}

function formatVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(0) + 'M';
  return (v/1e3).toFixed(0) + 'K';
}
